<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>후쿠오카 여행 🇯🇵</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#fff; --bg2:#f8f7f4; --bg3:#efefeb;
  --t:#1a1a18; --t2:#6b6b64; --t3:#b0b0a6;
  --br:rgba(0,0,0,.08); --br2:rgba(0,0,0,.15);
  --acc:#e8533a; --acc2:#f2a93b;
  --map-h:260px; --r:12px; --rs:8px;
  --header-h:56px;
}
html,body { height:100%; font-family:-apple-system,'Pretendard','Apple SD Gothic Neo',sans-serif; }
body { background:var(--bg2); color:var(--t); -webkit-font-smoothing:antialiased; overscroll-behavior:none; }
.app { max-width:480px; margin:0 auto; background:var(--bg); min-height:100vh; display:flex; flex-direction:column; }

.header { height:var(--header-h); display:flex; align-items:center; padding:0 16px; gap:10px; border-bottom:.5px solid var(--br); position:sticky; top:0; z-index:30; background:var(--bg); }
.header-back { background:none; border:none; font-size:22px; cursor:pointer; padding:4px; color:var(--t2); display:none; line-height:1; }
.header-back.show { display:flex; align-items:center; }
.header-title { font-size:17px; font-weight:700; color:var(--t); flex:1; }
.header-action { background:var(--acc); color:#fff; border:none; border-radius:20px; padding:6px 14px; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; }

.tabbar { display:flex; border-bottom:.5px solid var(--br); background:var(--bg); position:sticky; top:var(--header-h); z-index:29; }
.tab { flex:1; padding:14px 8px; text-align:center; font-size:13px; font-weight:500; color:var(--t3); cursor:pointer; border-bottom:2px solid transparent; }
.tab.on { color:var(--acc); border-bottom-color:var(--acc); }

.screen { display:none; flex:1; flex-direction:column; overflow:hidden; }
.screen.on { display:flex; }

/* 폴더 목록 */
.folder-list { padding:16px; display:flex; flex-direction:column; gap:10px; overflow-y:auto; flex:1; }
.folder-card { background:var(--bg); border:.5px solid var(--br2); border-radius:var(--r); padding:16px; cursor:pointer; display:flex; align-items:center; gap:14px; position:relative; overflow:hidden; }
.folder-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--fc, var(--acc)); }
.folder-icon { font-size:28px; flex-shrink:0; }
.folder-info { flex:1; min-width:0; }
.folder-name { font-size:15px; font-weight:600; color:var(--t); margin-bottom:3px; }
.folder-meta { font-size:12px; color:var(--t2); }
.folder-arrow { font-size:16px; color:var(--t3); }
.folder-add-btn { width:100%; padding:14px; border:1.5px dashed var(--br2); border-radius:var(--r); background:none; color:var(--t2); font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; }

/* 폴더 상세 */
.folder-detail { display:flex; flex-direction:column; flex:1; overflow:hidden; }
.map-container { height:var(--map-h); position:relative; background:var(--bg3); flex-shrink:0; }
#gmap { width:100%; height:100%; }
.map-loading { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:13px; color:var(--t2); }

.place-list-header { padding:12px 16px 8px; display:flex; align-items:center; justify-content:space-between; border-bottom:.5px solid var(--br); }
.place-list-title { font-size:13px; font-weight:600; color:var(--t2); }
.sort-tabs { display:flex; gap:4px; }
.sort-tab { font-size:12px; padding:4px 10px; border-radius:20px; border:.5px solid var(--br2); background:none; color:var(--t2); cursor:pointer; }
.sort-tab.on { background:var(--t); color:var(--bg); border-color:transparent; }

.place-list { flex:1; overflow-y:auto; }
.place-item-wrap { position:relative; overflow:hidden; border-bottom:.5px solid var(--br); }
.place-item { display:flex; align-items:center; gap:12px; padding:12px 16px; background:var(--bg); position:relative; transition:transform .25s ease; cursor:pointer; user-select:none; }
.place-rank { font-size:13px; font-weight:700; color:var(--t3); min-width:18px; text-align:center; }
.place-rank.r1 { color:#e8a800; } .place-rank.r2 { color:var(--t2); } .place-rank.r3 { color:#c8895a; }
.place-thumb { width:48px; height:48px; border-radius:var(--rs); overflow:hidden; background:var(--bg3); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:22px; }
.place-thumb img { width:100%; height:100%; object-fit:cover; }
.place-info { flex:1; min-width:0; }
.place-name { font-size:14px; font-weight:600; color:var(--t); margin-bottom:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.place-cat { font-size:11px; color:var(--t3); margin-bottom:3px; }
.place-addr { font-size:12px; color:var(--t2); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.vote-zone { display:flex; flex-direction:column; align-items:center; gap:1px; flex-shrink:0; }
.vote-btn { background:none; border:none; font-size:20px; cursor:pointer; padding:2px; line-height:1; }
.vote-count { font-size:12px; font-weight:600; color:var(--t2); }
.delete-bg { position:absolute; right:0; top:0; bottom:0; width:80px; background:#e8533a; display:flex; align-items:center; justify-content:center; cursor:pointer; }
.delete-bg span { color:#fff; font-size:13px; font-weight:600; }
.empty-state { padding:48px 24px; text-align:center; color:var(--t2); font-size:14px; line-height:1.6; }
.empty-icon { font-size:40px; display:block; margin-bottom:12px; }

/* 검색 */
.search-bar { padding:12px 16px; border-bottom:.5px solid var(--br); }
.search-input-wrap { position:relative; }
.search-input { width:100%; padding:10px 36px 10px 14px; font-size:14px; border:.5px solid var(--br2); border-radius:var(--r); background:var(--bg2); color:var(--t); outline:none; -webkit-appearance:none; }
.search-input:focus { border-color:var(--acc); background:var(--bg); }
.search-clear { position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--t3); font-size:18px; cursor:pointer; line-height:1; display:none; }
.search-clear.show { display:block; }
.search-results { flex:1; overflow-y:auto; }
.search-result-item { padding:12px 16px; border-bottom:.5px solid var(--br); display:flex; align-items:center; gap:12px; }
.result-icon { width:40px; height:40px; border-radius:var(--rs); background:var(--bg3); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; overflow:hidden; }
.result-icon img { width:100%; height:100%; object-fit:cover; }
.result-info { flex:1; min-width:0; }
.result-name { font-size:14px; font-weight:500; color:var(--t); margin-bottom:2px; }
.result-addr { font-size:12px; color:var(--t2); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.result-add-btn { background:var(--acc); color:#fff; border:none; border-radius:20px; padding:5px 12px; font-size:12px; font-weight:600; cursor:pointer; white-space:nowrap; flex-shrink:0; }
.result-add-btn.added { background:var(--bg3); color:var(--t2); }
.search-hint { padding:40px 24px; text-align:center; color:var(--t2); font-size:14px; }
.search-hint-icon { font-size:36px; display:block; margin-bottom:10px; }

/* 모달 공통 */
.modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:100; align-items:flex-end; justify-content:center; }
.modal-bg.open { display:flex; }
.modal { background:var(--bg); border-radius:20px 20px 0 0; padding:24px 20px 40px; width:100%; max-width:480px; }
.modal-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
.modal-title { font-size:17px; font-weight:700; color:var(--t); }
.modal-close { background:none; border:none; font-size:24px; cursor:pointer; color:var(--t2); line-height:1; }
.modal-field { margin-bottom:14px; }
.modal-field label { display:block; font-size:12px; color:var(--t2); margin-bottom:6px; font-weight:500; }
.modal-input { width:100%; padding:11px 14px; font-size:15px; border:.5px solid var(--br2); border-radius:var(--rs); background:var(--bg); color:var(--t); outline:none; -webkit-appearance:none; }
.modal-input:focus { border-color:var(--acc); }
.emoji-picker { display:flex; gap:8px; flex-wrap:wrap; }
.emoji-opt { width:40px; height:40px; border-radius:var(--rs); border:.5px solid var(--br2); background:var(--bg2); font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.emoji-opt.on { border-color:var(--acc); background:#fef0ee; }
.color-picker { display:flex; gap:8px; flex-wrap:wrap; }
.color-opt { width:28px; height:28px; border-radius:50%; cursor:pointer; border:2.5px solid transparent; }
.color-opt.on { border-color:var(--t); }
.modal-btn { width:100%; padding:14px; background:var(--acc); color:#fff; border:none; border-radius:var(--r); font-size:15px; font-weight:700; cursor:pointer; margin-top:6px; }

/* 폴더 선택 모달 */
.folder-select-list { display:flex; flex-direction:column; gap:8px; max-height:300px; overflow-y:auto; }
.folder-select-item { padding:12px 14px; border:.5px solid var(--br2); border-radius:var(--rs); cursor:pointer; display:flex; align-items:center; gap:10px; font-size:14px; font-weight:500; }
.folder-select-item:hover { background:var(--bg2); }
.folder-select-item.on { border-color:var(--acc); background:#fef0ee; color:var(--acc); }

/* 장소 상세 시트 */
.place-sheet { background:var(--bg); border-radius:20px 20px 0 0; padding:20px 20px 40px; width:100%; max-width:480px; max-height:85vh; overflow-y:auto; }
.sheet-drag { width:40px; height:4px; background:var(--bg3); border-radius:2px; margin:0 auto 16px; }
.sheet-img-wrap { width:100%; height:180px; border-radius:var(--rs); overflow:hidden; background:var(--bg3); display:flex; align-items:center; justify-content:center; margin-bottom:14px; }
.sheet-img-wrap img { width:100%; height:100%; object-fit:cover; }
.sheet-name { font-size:18px; font-weight:700; color:var(--t); margin-bottom:4px; }
.sheet-cat { font-size:13px; color:var(--t2); margin-bottom:8px; }
.sheet-addr { font-size:13px; color:var(--t2); line-height:1.5; margin-bottom:14px; }
.sheet-actions { display:flex; gap:8px; }
.sheet-btn { flex:1; padding:11px; border-radius:var(--rs); border:.5px solid var(--br2); background:var(--bg2); color:var(--t); font-size:13px; font-weight:500; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:5px; }
.sheet-btn.primary { background:var(--acc); color:#fff; border-color:transparent; }

.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:rgba(20,20,18,.88); color:#fff; padding:10px 18px; border-radius:20px; font-size:13px; z-index:300; opacity:0; transition:opacity .25s; pointer-events:none; white-space:nowrap; }
.toast.show { opacity:1; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <button class="header-back" id="header-back" onclick="goBack()">&#8592;</button>
    <span class="header-title" id="header-title">후쿠오카 여행 &#127471;&#127477;</span>
    <button class="header-action" id="header-action" onclick="headerAction()">+ 폴더</button>
  </div>
  <div class="tabbar" id="tabbar">
    <div class="tab on" id="tab-home" onclick="switchTab('home')">&#128193; 위시리스트</div>
    <div class="tab" id="tab-search" onclick="switchTab('search')">&#128269; 검색</div>
  </div>

  <!-- 홈 -->
  <div class="screen on" id="screen-home">
    <div class="folder-list" id="folder-list"></div>
  </div>

  <!-- 폴더 상세 -->
  <div class="screen" id="screen-folder">
    <div class="folder-detail">
      <div class="map-container">
        <div id="gmap"></div>
        <div class="map-loading" id="map-loading">지도 불러오는 중...</div>
      </div>
      <div class="place-list-header">
        <span class="place-list-title" id="place-count">0곳</span>
        <div class="sort-tabs">
          <button class="sort-tab on" onclick="setSort(this,'added')">추가순</button>
          <button class="sort-tab" onclick="setSort(this,'votes')">투표순</button>
        </div>
      </div>
      <div class="place-list" id="place-list"></div>
    </div>
  </div>

  <!-- 검색 -->
  <div class="screen" id="screen-search">
    <div class="search-bar">
      <div class="search-input-wrap">
        <input class="search-input" id="search-input" type="text"
          placeholder="장소, 음식점, 관광지 검색..."
          autocomplete="off">
        <button class="search-clear" id="search-clear" onclick="clearSearch()">&#215;</button>
      </div>
    </div>
    <div class="search-results" id="search-results">
      <div class="search-hint">
        <span class="search-hint-icon">&#128269;</span>
        후쿠오카에서 가고 싶은 곳을 검색해보세요
      </div>
    </div>
  </div>
</div>

<!-- 폴더 생성 모달 -->
<div class="modal-bg" id="folder-modal-bg">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">폴더 만들기</span>
      <button class="modal-close" id="folder-modal-close">&#215;</button>
    </div>
    <div class="modal-field">
      <label>폴더 이름</label>
      <input class="modal-input" id="folder-name-input" placeholder="예) 맛집, 카페, 숙소...">
    </div>
    <div class="modal-field">
      <label>아이콘</label>
      <div class="emoji-picker" id="emoji-picker"></div>
    </div>
    <div class="modal-field">
      <label>색상</label>
      <div class="color-picker" id="color-picker"></div>
    </div>
    <button class="modal-btn" id="create-folder-btn">만들기</button>
  </div>
</div>

<!-- 폴더 선택 모달 -->
<div class="modal-bg" id="folder-select-bg">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title" id="folder-select-title">위시리스트에 추가</span>
      <button class="modal-close" id="folder-select-close">&#215;</button>
    </div>
    <div class="folder-select-list" id="folder-select-list"></div>
    <button class="modal-btn" id="confirm-add-btn" style="margin-top:14px">추가하기</button>
  </div>
</div>

<!-- 장소 상세 시트 -->
<div class="modal-bg" id="place-sheet-bg">
  <div class="place-sheet" id="place-sheet-inner"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ── STATE ── */
var APP = {
  folders: [],
  currentFolderId: null,
  sortBy: 'added',
  pendingPlace: null,
  selectedFolderIds: [],
  map: null,
  markers: [],
  searchTimer: null,
  placesService: null,
  mapReady: false
};

var EMOJIS = ['🍜','🍣','☕','🏨','🌸','🎮','🛍️','🍺','🌊','🏯','🎭','🍱'];
var COLORS = ['#e8533a','#f2a93b','#3b82f6','#10b981','#8b5cf6','#ec4899','#14b8a6','#f59e0b'];

/* ── 이벤트 바인딩 (DOMContentLoaded 후) ── */
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('folder-modal-close').addEventListener('click', function() {
    document.getElementById('folder-modal-bg').classList.remove('open');
  });
  document.getElementById('folder-modal-bg').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('open');
  });
  document.getElementById('folder-select-close').addEventListener('click', function() {
    document.getElementById('folder-select-bg').classList.remove('open');
  });
  document.getElementById('folder-select-bg').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('open');
  });
  document.getElementById('place-sheet-bg').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('open');
  });
  document.getElementById('create-folder-btn').addEventListener('click', createFolder);
  document.getElementById('confirm-add-btn').addEventListener('click', confirmAddToFolder);
  document.getElementById('search-input').addEventListener('input', function() {
    var val = this.value;
    document.getElementById('search-clear').classList.toggle('show', val.length > 0);
    clearTimeout(APP.searchTimer);
    if (!val.trim()) {
      document.getElementById('search-results').innerHTML = '<div class="search-hint"><span class="search-hint-icon">🔍</span>후쿠오카에서 가고 싶은 곳을 검색해보세요</div>';
      return;
    }
    APP.searchTimer = setTimeout(function() { doSearch(val); }, 400);
  });

  renderFolderList();
  loadMapsKey();
});

/* ── Google Maps 키 로드 ── */
function loadMapsKey() {
  fetch('/api/maps-key')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data.key) return;
      var s = document.createElement('script');
      s.src = 'https://maps.googleapis.com/maps/api/js?key=' + data.key + '&libraries=places&language=ko&callback=onMapsReady';
      s.async = true;
      document.head.appendChild(s);
    })
    .catch(function(e) { console.warn('Maps key error:', e); });
}

window.onMapsReady = function() {
  APP.mapReady = true;
  if (APP.currentFolderId) initMap();
};

/* ── 폴더 ── */
function openFolderModal() {
  var ep = document.getElementById('emoji-picker');
  ep.innerHTML = EMOJIS.map(function(e, i) {
    return '<div class="emoji-opt' + (i===0?' on':'') + '" data-emoji="' + e + '">' + e + '</div>';
  }).join('');
  ep.querySelectorAll('.emoji-opt').forEach(function(el) {
    el.addEventListener('click', function() {
      ep.querySelectorAll('.emoji-opt').forEach(function(x) { x.classList.remove('on'); });
      el.classList.add('on');
    });
  });
  var cp = document.getElementById('color-picker');
  cp.innerHTML = COLORS.map(function(c, i) {
    return '<div class="color-opt' + (i===0?' on':'') + '" data-color="' + c + '" style="background:' + c + '"></div>';
  }).join('');
  cp.querySelectorAll('.color-opt').forEach(function(el) {
    el.addEventListener('click', function() {
      cp.querySelectorAll('.color-opt').forEach(function(x) { x.classList.remove('on'); });
      el.classList.add('on');
    });
  });
  document.getElementById('folder-name-input').value = '';
  document.getElementById('folder-modal-bg').classList.add('open');
  setTimeout(function() { document.getElementById('folder-name-input').focus(); }, 300);
}

function createFolder() {
  var name = document.getElementById('folder-name-input').value.trim();
  if (!name) { showToast('폴더 이름을 입력해주세요'); return; }
  var emoji = (document.querySelector('#emoji-picker .emoji-opt.on') || {}).dataset || {};
  var color = (document.querySelector('#color-picker .color-opt.on') || {}).dataset || {};
  APP.folders.push({
    id: Date.now(),
    name: name,
    emoji: emoji.emoji || '📁',
    color: color.color || COLORS[0],
    places: []
  });
  document.getElementById('folder-modal-bg').classList.remove('open');
  renderFolderList();
  showToast('"' + name + '" 폴더를 만들었어요');
}

function renderFolderList() {
  var list = document.getElementById('folder-list');
  if (!APP.folders.length) {
    list.innerHTML = '<div class="empty-state"><span class="empty-icon">📂</span>아직 폴더가 없어요<br>+ 폴더 버튼으로 만들어보세요!</div>';
    return;
  }
  var html = APP.folders.map(function(f) {
    return '<div class="folder-card" style="--fc:' + f.color + '" data-id="' + f.id + '">' +
      '<span class="folder-icon">' + f.emoji + '</span>' +
      '<div class="folder-info">' +
        '<div class="folder-name">' + esc(f.name) + '</div>' +
        '<div class="folder-meta">' + f.places.length + '곳 저장됨</div>' +
      '</div>' +
      '<span class="folder-arrow">›</span>' +
    '</div>';
  }).join('') + '<button class="folder-add-btn" id="inner-add-folder-btn">＋ 새 폴더 만들기</button>';
  list.innerHTML = html;
  list.querySelectorAll('.folder-card').forEach(function(el) {
    el.addEventListener('click', function() { openFolder(Number(el.dataset.id)); });
  });
  var innerBtn = document.getElementById('inner-add-folder-btn');
  if (innerBtn) innerBtn.addEventListener('click', openFolderModal);
}

function getFolder(id) {
  return APP.folders.find(function(f) { return f.id === id; });
}

/* ── 폴더 열기 ── */
function openFolder(folderId) {
  APP.currentFolderId = folderId;
  APP.sortBy = 'added';
  var folder = getFolder(folderId);
  document.getElementById('header-back').classList.add('show');
  document.getElementById('header-title').textContent = folder.emoji + ' ' + folder.name;
  document.getElementById('header-action').textContent = '+ 검색';
  document.getElementById('tabbar').style.display = 'none';
  showScreen('folder');
  renderPlaceList();
  initMap();
}

function goBack() {
  APP.currentFolderId = null;
  document.getElementById('header-back').classList.remove('show');
  document.getElementById('header-title').textContent = '후쿠오카 여행 🇯🇵';
  document.getElementById('header-action').textContent = '+ 폴더';
  document.getElementById('tabbar').style.display = 'flex';
  showScreen('home');
  renderFolderList();
}

function headerAction() {
  if (APP.currentFolderId) {
    APP.currentFolderId = null;
    document.getElementById('header-back').classList.remove('show');
    document.getElementById('header-title').textContent = '후쿠오카 여행 🇯🇵';
    document.getElementById('header-action').textContent = '+ 폴더';
    document.getElementById('tabbar').style.display = 'flex';
    switchTab('search');
  } else {
    openFolderModal();
  }
}

/* ── 장소 리스트 ── */
function setSort(btn, sort) {
  APP.sortBy = sort;
  document.querySelectorAll('.sort-tab').forEach(function(b) { b.classList.remove('on'); });
  btn.classList.add('on');
  renderPlaceList();
}

function renderPlaceList() {
  var folder = getFolder(APP.currentFolderId);
  if (!folder) return;
  document.getElementById('place-count').textContent = folder.places.length + '곳';
  var list = document.getElementById('place-list');
  if (!folder.places.length) {
    list.innerHTML = '<div class="empty-state"><span class="empty-icon">' + folder.emoji + '</span>아직 저장된 장소가 없어요<br>검색탭에서 추가해보세요</div>';
    return;
  }
  var places = folder.places.slice();
  if (APP.sortBy === 'votes') {
    places.sort(function(a,b) { return (b.votes||0)-(a.votes||0); });
  } else {
    places.sort(function(a,b) { return b.addedAt-a.addedAt; });
  }
  list.innerHTML = places.map(function(place, idx) {
    var rankClass = idx===0?'r1':idx===1?'r2':idx===2?'r3':'';
    var rank = APP.sortBy==='votes' ? '<span class="place-rank ' + rankClass + '">' + (idx+1) + '</span>' : '';
    var thumb = place.photo
      ? '<img src="' + esc(place.photo) + '" alt="">'
      : (place.emoji || '📍');
    return '<div class="place-item-wrap" id="wrap-' + place.id + '">' +
      '<div class="delete-bg" data-pid="' + place.id + '"><span>삭제</span></div>' +
      '<div class="place-item" id="item-' + place.id + '" data-pid="' + place.id + '">' +
        rank +
        '<div class="place-thumb">' + thumb + '</div>' +
        '<div class="place-info">' +
          '<div class="place-name">' + esc(place.name) + '</div>' +
          '<div class="place-cat">' + esc(place.category||'') + '</div>' +
          '<div class="place-addr">' + esc(place.address||'') + '</div>' +
        '</div>' +
        '<div class="vote-zone">' +
          '<button class="vote-btn" data-pid="' + place.id + '">❤️</button>' +
          '<span class="vote-count" id="vc-' + place.id + '">' + (place.votes||0) + '</span>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  // 이벤트 바인딩
  list.querySelectorAll('.vote-btn').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      vote(Number(btn.dataset.pid));
    });
  });
  list.querySelectorAll('.delete-bg').forEach(function(el) {
    el.addEventListener('click', function() {
      deletePlace(Number(el.dataset.pid));
    });
  });
  list.querySelectorAll('.place-item').forEach(function(el) {
    el.addEventListener('click', function() {
      openPlaceSheet(Number(el.dataset.pid));
    });
    bindSwipe(el, Number(el.dataset.pid));
  });

  updateMapMarkers();
}

function vote(placeId) {
  var folder = getFolder(APP.currentFolderId);
  if (!folder) return;
  var place = folder.places.find(function(p) { return p.id === placeId; });
  if (!place) return;
  place.votes = (place.votes||0) + 1;
  var vc = document.getElementById('vc-' + placeId);
  if (vc) vc.textContent = place.votes;
  showToast('투표했어요 ❤️');
}

function deletePlace(placeId) {
  var folder = getFolder(APP.currentFolderId);
  if (!folder) return;
  folder.places = folder.places.filter(function(p) { return p.id !== placeId; });
  renderPlaceList();
  showToast('삭제했어요');
}

/* ── 스와이프 삭제 ── */
function bindSwipe(el, id) {
  var startX = 0, moved = false;
  el.addEventListener('touchstart', function(e) {
    startX = e.touches[0].clientX;
    moved = false;
  }, { passive: true });
  el.addEventListener('touchmove', function(e) {
    var dx = e.touches[0].clientX - startX;
    if (dx < -8) {
      moved = true;
      var t = Math.max(dx, -80);
      el.style.transform = 'translateX(' + t + 'px)';
    }
  }, { passive: true });
  el.addEventListener('touchend', function() {
    if (!moved) return;
    var cur = parseFloat(el.style.transform.replace(/[^-\d.]/g,'')) || 0;
    el.style.transform = cur < -40 ? 'translateX(-80px)' : '';
    moved = false;
  });
}

/* ── 장소 상세 ── */
function openPlaceSheet(placeId) {
  var folder = getFolder(APP.currentFolderId);
  if (!folder) return;
  var place = folder.places.find(function(p) { return p.id === placeId; });
  if (!place) return;
  var inner = document.getElementById('place-sheet-inner');
  var imgHtml = place.photo
    ? '<div class="sheet-img-wrap"><img src="' + esc(place.photo) + '" alt=""></div>'
    : '<div class="sheet-img-wrap" style="font-size:40px">' + (place.emoji||'📍') + '</div>';
  var mapsBtn = place.mapsUrl
    ? '<button class="sheet-btn" id="sheet-maps-btn">🗺️ 구글맵</button>'
    : '';
  inner.innerHTML = '<div class="sheet-drag"></div>' +
    imgHtml +
    '<div class="sheet-name">' + esc(place.name) + '</div>' +
    '<div class="sheet-cat">' + esc(place.category||'') + '</div>' +
    '<div class="sheet-addr">📍 ' + esc(place.address||'주소 정보 없음') + '</div>' +
    '<div class="sheet-actions">' +
      mapsBtn +
      '<button class="sheet-btn primary" id="sheet-vote-btn">❤️ 투표 (' + (place.votes||0) + ')</button>' +
    '</div>';
  if (place.mapsUrl) {
    document.getElementById('sheet-maps-btn').addEventListener('click', function() {
      window.open(place.mapsUrl, '_blank');
    });
  }
  document.getElementById('sheet-vote-btn').addEventListener('click', function() {
    vote(placeId);
    document.getElementById('place-sheet-bg').classList.remove('open');
  });
  document.getElementById('place-sheet-bg').classList.add('open');
}

/* ── 구글맵 ── */
var mapInitialized = false;
function initMap() {
  if (!APP.mapReady) {
    document.getElementById('map-loading').textContent = 'API 키를 Vercel 환경변수에 넣어주세요';
    return;
  }
  if (!mapInitialized) {
    document.getElementById('map-loading').style.display = 'none';
    APP.map = new google.maps.Map(document.getElementById('gmap'), {
      center: { lat:33.5902, lng:130.4017 },
      zoom: 13,
      mapTypeControl: false,
      streetViewControl: false,
      fullscreenControl: false
    });
    APP.placesService = new google.maps.places.PlacesService(APP.map);
    mapInitialized = true;
  }
  updateMapMarkers();
}

function updateMapMarkers() {
  if (!APP.map) return;
  APP.markers.forEach(function(m) { m.setMap(null); });
  APP.markers = [];
  var folder = getFolder(APP.currentFolderId);
  if (!folder) return;
  var bounds = new google.maps.LatLngBounds();
  var hasPin = false;
  folder.places.forEach(function(place, idx) {
    if (!place.lat || !place.lng) return;
    var marker = new google.maps.Marker({
      position: { lat: place.lat, lng: place.lng },
      map: APP.map,
      title: place.name,
      label: { text: String(idx+1), color:'#fff', fontSize:'12px', fontWeight:'700' },
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 16,
        fillColor: '#e8533a',
        fillOpacity: 1,
        strokeColor: '#fff',
        strokeWeight: 2
      }
    });
    (function(pid) {
      marker.addListener('click', function() { openPlaceSheet(pid); });
    })(place.id);
    APP.markers.push(marker);
    bounds.extend({ lat: place.lat, lng: place.lng });
    hasPin = true;
  });
  if (hasPin) APP.map.fitBounds(bounds, { top:20, right:20, bottom:20, left:20 });
}

/* ── 검색 ── */
function doSearch(query) {
  var resultsEl = document.getElementById('search-results');
  resultsEl.innerHTML = '<div class="search-hint"><span class="search-hint-icon">⏳</span>검색 중...</div>';
  if (!APP.placesService) {
    showDummyResults(query);
    return;
  }
  APP.placesService.textSearch(
    { query: query + ' 후쿠오카' },
    function(results, status) {
      if (status === google.maps.places.PlacesServiceStatus.OK && results && results.length) {
        renderResults(results);
      } else {
        resultsEl.innerHTML = '<div class="search-hint"><span class="search-hint-icon">😅</span>검색 결과가 없어요</div>';
      }
    }
  );
}

function getCatEmoji(type) {
  var map = { restaurant:'🍽️', food:'🍜', cafe:'☕', lodging:'🏨', tourist_attraction:'🌸', store:'🛍️', bar:'🍺', park:'🌳', museum:'🏛️' };
  return map[type] || '📍';
}

function renderResults(results) {
  var resultsEl = document.getElementById('search-results');
  var addedIds = APP.folders.reduce(function(acc, f) {
    f.places.forEach(function(p) { if(p.placeId) acc[p.placeId] = true; });
    return acc;
  }, {});

  // 검색 결과를 APP.searchResults에 저장
  APP.searchResults = {};
  results.slice(0,10).forEach(function(place) {
    APP.searchResults[place.place_id] = place;
  });

  resultsEl.innerHTML = results.slice(0,10).map(function(place) {
    var photoUrl = place.photos && place.photos[0] ? place.photos[0].getUrl({maxWidth:80,maxHeight:80}) : '';
    var cat = (place.types||[]).find(function(t) { return !['point_of_interest','establishment'].includes(t); });
    var catLabel = {restaurant:'음식점',food:'음식점',cafe:'카페',lodging:'숙소',tourist_attraction:'관광지',store:'쇼핑',bar:'바'}[cat] || (cat ? cat.replace(/_/g,' ') : '');
    var isAdded = !!addedIds[place.place_id];
    return '<div class="search-result-item">' +
      '<div class="result-icon">' + (photoUrl ? '<img src="' + esc(photoUrl) + '" alt="">' : getCatEmoji(cat)) + '</div>' +
      '<div class="result-info">' +
        '<div class="result-name">' + esc(place.name) + '</div>' +
        '<div class="result-addr">' + esc((catLabel?catLabel+' · ':'') + (place.formatted_address||'')) + '</div>' +
      '</div>' +
      '<button class="result-add-btn' + (isAdded?' added':'') + '" data-pid="' + esc(place.place_id) + '">' +
        (isAdded ? '저장됨' : '+ 저장') +
      '</button>' +
    '</div>';
  }).join('');

  resultsEl.querySelectorAll('.result-add-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var pid = btn.dataset.pid;
      var place = APP.searchResults[pid];
      if (!place) return;
      var photoUrl = place.photos && place.photos[0] ? place.photos[0].getUrl({maxWidth:400,maxHeight:300}) : '';
      var cat = (place.types||[]).find(function(t) { return !['point_of_interest','establishment'].includes(t); });
      var catLabel = {restaurant:'음식점',food:'음식점',cafe:'카페',lodging:'숙소',tourist_attraction:'관광지',store:'쇼핑',bar:'바'}[cat] || (cat?cat.replace(/_/g,' '):'');
      openFolderSelectModal({
        placeId: place.place_id,
        name: place.name,
        address: place.formatted_address || '',
        category: catLabel,
        lat: place.geometry && place.geometry.location ? place.geometry.location.lat() : null,
        lng: place.geometry && place.geometry.location ? place.geometry.location.lng() : null,
        photo: photoUrl,
        emoji: getCatEmoji(cat),
        mapsUrl: 'https://www.google.com/maps/place/?q=place_id:' + place.place_id
      });
    });
  });
}

function showDummyResults(query) {
  document.getElementById('search-results').innerHTML =
    '<div style="padding:10px 16px;font-size:12px;color:var(--t3);background:var(--bg2)">⚠️ 지도 API 연결 전 미리보기 모드</div>' +
    ['이치란 라멘 캐널시티점','모츠나베 오야마 본점','후쿠오카 타워'].map(function(name) {
      return '<div class="search-result-item">' +
        '<div class="result-icon">🍜</div>' +
        '<div class="result-info"><div class="result-name">' + name + '</div><div class="result-addr">후쿠오카시</div></div>' +
        '<button class="result-add-btn" data-dummy="' + esc(name) + '">+ 저장</button>' +
      '</div>';
    }).join('');
  document.querySelectorAll('[data-dummy]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      openFolderSelectModal({ name: btn.dataset.dummy, address:'후쿠오카시', category:'음식점', emoji:'🍜', lat:33.59, lng:130.40 });
    });
  });
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  document.getElementById('search-clear').classList.remove('show');
  document.getElementById('search-results').innerHTML = '<div class="search-hint"><span class="search-hint-icon">🔍</span>후쿠오카에서 가고 싶은 곳을 검색해보세요</div>';
}

/* ── 폴더 선택 모달 ── */
function openFolderSelectModal(placeData) {
  APP.pendingPlace = placeData;
  APP.selectedFolderIds = [];
  var titleEl = document.getElementById('folder-select-title');
  titleEl.textContent = '"' + (placeData.name||'') + '" 저장하기';
  var listEl = document.getElementById('folder-select-list');
  if (!APP.folders.length) {
    listEl.innerHTML = '<div style="padding:16px;text-align:center;color:var(--t2);font-size:14px">폴더가 없어요. 먼저 폴더를 만들어주세요!</div>';
  } else {
    listEl.innerHTML = APP.folders.map(function(f) {
      return '<div class="folder-select-item" data-fid="' + f.id + '">' +
        '<span style="width:10px;height:10px;border-radius:50%;background:' + f.color + ';flex-shrink:0"></span>' +
        '<span>' + f.emoji + ' ' + esc(f.name) + '</span>' +
        '<span style="margin-left:auto;font-size:12px;color:var(--t3)">' + f.places.length + '곳</span>' +
      '</div>';
    }).join('');
    listEl.querySelectorAll('.folder-select-item').forEach(function(el) {
      el.addEventListener('click', function() {
        var fid = Number(el.dataset.fid);
        var idx = APP.selectedFolderIds.indexOf(fid);
        if (idx > -1) { APP.selectedFolderIds.splice(idx,1); el.classList.remove('on'); }
        else { APP.selectedFolderIds.push(fid); el.classList.add('on'); }
      });
    });
    // 현재 열린 폴더 자동 선택
    if (APP.currentFolderId) {
      var el = listEl.querySelector('[data-fid="' + APP.currentFolderId + '"]');
      if (el) { el.classList.add('on'); APP.selectedFolderIds.push(APP.currentFolderId); }
    }
  }
  document.getElementById('folder-select-bg').classList.add('open');
}

function confirmAddToFolder() {
  if (!APP.selectedFolderIds.length) { showToast('폴더를 선택해주세요'); return; }
  var place = APP.pendingPlace;
  APP.selectedFolderIds.forEach(function(fid) {
    var folder = getFolder(fid);
    if (!folder) return;
    if (place.placeId && folder.places.find(function(p) { return p.placeId === place.placeId; })) return;
    folder.places.push(Object.assign({}, place, { id: Date.now() + Math.random(), addedAt: Date.now(), votes: 0 }));
  });
  document.getElementById('folder-select-bg').classList.remove('open');
  showToast(APP.selectedFolderIds.length + '개 폴더에 저장했어요 ✓');
  renderFolderList();
  if (APP.currentFolderId) renderPlaceList();
}

/* ── 화면 전환 ── */
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('on'); });
  document.getElementById('screen-' + name).classList.add('on');
}
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('on'); });
  document.getElementById('tab-' + name).classList.add('on');
  showScreen(name);
  if (name === 'search') setTimeout(function() { document.getElementById('search-input').focus(); }, 200);
}

/* ── UTIL ── */
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2400);
}
</script>
