<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>후쿠오카 여행 🇯🇵</title>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #fff;
  --bg2: #f8f7f4;
  --bg3: #efefeb;
  --t: #1a1a18;
  --t2: #6b6b64;
  --t3: #b0b0a6;
  --br: rgba(0,0,0,.08);
  --br2: rgba(0,0,0,.15);
  --acc: #e8533a;      /* 후쿠오카 테마 — 따뜻한 주홍 */
  --acc2: #f2a93b;     /* 노란 계열 포인트 */
  --map-h: 260px;
  --r: 12px; --rs: 8px;
  --header-h: 56px;
  --tab-h: 52px;
}
html, body { height: 100%; font-family: -apple-system, 'Pretendard', 'Apple SD Gothic Neo', sans-serif; }
body { background: var(--bg2); color: var(--t); -webkit-font-smoothing: antialiased; overscroll-behavior: none; }

/* ── 전체 레이아웃 ── */
.app { max-width: 480px; margin: 0 auto; background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; position: relative; }

/* ── 헤더 ── */
.header { height: var(--header-h); display: flex; align-items: center; padding: 0 16px; gap: 10px; border-bottom: .5px solid var(--br); position: sticky; top: 0; z-index: 30; background: var(--bg); }
.header-back { background: none; border: none; font-size: 20px; cursor: pointer; padding: 4px; color: var(--t2); display: none; line-height: 1; }
.header-back.show { display: flex; align-items: center; }
.header-title { font-size: 17px; font-weight: 700; color: var(--t); flex: 1; }
.header-sub { font-size: 13px; color: var(--t2); }
.header-action { background: var(--acc); color: #fff; border: none; border-radius: 20px; padding: 6px 14px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }

/* ── 탭바 ── */
.tabbar { display: flex; border-bottom: .5px solid var(--br); background: var(--bg); position: sticky; top: var(--header-h); z-index: 29; }
.tab { flex: 1; padding: 14px 8px; text-align: center; font-size: 13px; font-weight: 500; color: var(--t3); cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s; }
.tab.on { color: var(--acc); border-bottom-color: var(--acc); }

/* ── 화면 전환 ── */
.screen { display: none; flex: 1; flex-direction: column; overflow: hidden; }
.screen.on { display: flex; }

/* ══════════════════════════
   홈 화면 (위시리스트 폴더 목록)
══════════════════════════ */
.folder-list { padding: 16px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; flex: 1; }
.folder-card {
  background: var(--bg);
  border: .5px solid var(--br2);
  border-radius: var(--r);
  padding: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 14px;
  transition: background .12s;
  position: relative;
  overflow: hidden;
}
.folder-card::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
  background: var(--folder-color, var(--acc));
}
.folder-card:hover { background: var(--bg2); }
.folder-icon { font-size: 28px; flex-shrink: 0; }
.folder-info { flex: 1; min-width: 0; }
.folder-name { font-size: 15px; font-weight: 600; color: var(--t); margin-bottom: 3px; }
.folder-meta { font-size: 12px; color: var(--t2); }
.folder-arrow { font-size: 16px; color: var(--t3); }
.folder-add-btn {
  width: 100%; padding: 14px; border: 1.5px dashed var(--br2); border-radius: var(--r);
  background: none; color: var(--t2); font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: background .12s;
}
.folder-add-btn:hover { background: var(--bg2); }

/* ══════════════════════════
   폴더 상세 화면
══════════════════════════ */
.folder-detail { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

/* 지도 */
.map-container { height: var(--map-h); position: relative; background: var(--bg3); flex-shrink: 0; }
#gmap { width: 100%; height: 100%; }
.map-loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; color: var(--t2); }

/* 장소 리스트 */
.place-list-header { padding: 12px 16px 8px; display: flex; align-items: center; justify-content: space-between; border-bottom: .5px solid var(--br); }
.place-list-title { font-size: 13px; font-weight: 600; color: var(--t2); }
.sort-tabs { display: flex; gap: 4px; }
.sort-tab { font-size:12px; padding: 4px 10px; border-radius: 20px; border: .5px solid var(--br2); background: none; color: var(--t2); cursor: pointer; }
.sort-tab.on { background: var(--t); color: var(--bg); border-color: transparent; }

.place-list { flex: 1; overflow-y: auto; }
.place-item-wrap { position: relative; overflow: hidden; border-bottom: .5px solid var(--br); }
.place-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; background: var(--bg);
  position: relative; transition: transform .25s ease;
  cursor: pointer;
}
.place-item:active { background: var(--bg2); }
.place-rank { font-size: 13px; font-weight: 700; color: var(--t3); min-width: 18px; text-align: center; }
.place-rank.top1 { color: #e8a800; }
.place-rank.top2 { color: var(--t2); }
.place-rank.top3 { color: #c8895a; }
.place-thumb { width: 48px; height: 48px; border-radius: var(--rs); overflow: hidden; background: var(--bg3); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 22px; }
.place-thumb img { width: 100%; height: 100%; object-fit: cover; }
.place-info { flex: 1; min-width: 0; }
.place-name { font-size: 14px; font-weight: 600; color: var(--t); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.place-cat { font-size: 11px; color: var(--t3); margin-bottom: 4px; }
.place-addr { font-size: 12px; color: var(--t2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.vote-zone { display: flex; flex-direction: column; align-items: center; gap: 1px; flex-shrink: 0; }
.vote-btn { background: none; border: none; font-size: 20px; cursor: pointer; padding: 2px; line-height: 1; }
.vote-count { font-size: 12px; font-weight: 600; color: var(--t2); }

/* 스와이프 삭제 */
.delete-bg {
  position: absolute; right: 0; top: 0; bottom: 0; width: 80px;
  background: #e8533a; display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}
.delete-bg span { color: #fff; font-size: 13px; font-weight: 600; }

/* 빈 상태 */
.empty-state { padding: 48px 24px; text-align: center; color: var(--t2); font-size: 14px; line-height: 1.6; }
.empty-icon { font-size: 40px; display: block; margin-bottom: 12px; }

/* ══════════════════════════
   검색 화면
══════════════════════════ */
.search-bar { padding: 12px 16px; border-bottom: .5px solid var(--br); display: flex; gap: 8px; }
.search-input-wrap { flex: 1; position: relative; }
.search-input { width: 100%; padding: 10px 36px 10px 14px; font-size: 14px; border: .5px solid var(--br2); border-radius: var(--r); background: var(--bg2); color: var(--t); outline: none; -webkit-appearance: none; }
.search-input:focus { border-color: var(--acc); background: var(--bg); }
.search-clear { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--t3); font-size: 18px; cursor: pointer; line-height: 1; display: none; }
.search-clear.show { display: block; }
.search-results { flex: 1; overflow-y: auto; }
.search-result-item { padding: 12px 16px; border-bottom: .5px solid var(--br); display: flex; align-items: center; gap: 12px; cursor: pointer; }
.search-result-item:hover { background: var(--bg2); }
.result-icon { width: 40px; height: 40px; border-radius: var(--rs); background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; overflow: hidden; }
.result-icon img { width: 100%; height: 100%; object-fit: cover; }
.result-info { flex: 1; min-width: 0; }
.result-name { font-size: 14px; font-weight: 500; color: var(--t); margin-bottom: 2px; }
.result-addr { font-size: 12px; color: var(--t2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.result-add-btn { background: var(--acc); color: #fff; border: none; border-radius: 20px; padding: 5px 12px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
.result-add-btn.added { background: var(--bg3); color: var(--t2); }
.search-hint { padding: 40px 24px; text-align: center; color: var(--t2); font-size: 14px; }
.search-hint-icon { font-size: 36px; display: block; margin-bottom: 10px; }

/* ══════════════════════════
   모달
══════════════════════════ */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 100; align-items: flex-end; justify-content: center; }
.modal-bg.open { display: flex; }
.modal { background: var(--bg); border-radius: 20px 20px 0 0; padding: 24px 20px 40px; width: 100%; max-width: 480px; }
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.modal-title { font-size: 17px; font-weight: 700; color: var(--t); }
.modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--t2); line-height: 1; }
.modal-field { margin-bottom: 14px; }
.modal-field label { display: block; font-size: 12px; color: var(--t2); margin-bottom: 6px; font-weight: 500; }
.modal-input { width: 100%; padding: 11px 14px; font-size: 15px; border: .5px solid var(--br2); border-radius: var(--rs); background: var(--bg); color: var(--t); outline: none; -webkit-appearance: none; }
.modal-input:focus { border-color: var(--acc); }
.emoji-picker { display: flex; gap: 8px; flex-wrap: wrap; }
.emoji-opt { width: 40px; height: 40px; border-radius: var(--rs); border: .5px solid var(--br2); background: var(--bg2); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.emoji-opt.on { border-color: var(--acc); background: #fef0ee; }
.color-picker { display: flex; gap: 8px; flex-wrap: wrap; }
.color-opt { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
.color-opt.on { border-color: var(--t); }
.modal-btn { width: 100%; padding: 14px; background: var(--acc); color: #fff; border: none; border-radius: var(--r); font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 6px; }
.modal-btn:active { opacity: .85; }

/* 폴더 선택 모달 */
.folder-select-list { display: flex; flex-direction: column; gap: 8px; max-height: 300px; overflow-y: auto; }
.folder-select-item { padding: 12px 14px; border: .5px solid var(--br2); border-radius: var(--rs); cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 500; }
.folder-select-item:hover { background: var(--bg2); }
.folder-select-item.on { border-color: var(--acc); background: #fef0ee; color: var(--acc); }

/* 장소 상세 바텀시트 */
.place-sheet { background: var(--bg); border-radius: 20px 20px 0 0; padding: 20px 20px 40px; width: 100%; max-width: 480px; max-height: 85vh; overflow-y: auto; }
.place-sheet-img { width: 100%; height: 180px; object-fit: cover; border-radius: var(--rs); margin-bottom: 14px; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 40px; }
.place-sheet-img img { width: 100%; height: 100%; object-fit: cover; border-radius: var(--rs); }
.place-sheet-name { font-size: 18px; font-weight: 700; color: var(--t); margin-bottom: 4px; }
.place-sheet-cat { font-size: 13px; color: var(--t2); margin-bottom: 10px; }
.place-sheet-addr { font-size: 13px; color: var(--t2); line-height: 1.5; margin-bottom: 14px; }
.place-sheet-actions { display: flex; gap: 8px; margin-bottom: 16px; }
.sheet-btn { flex: 1; padding: 11px; border-radius: var(--rs); border: .5px solid var(--br2); background: var(--bg2); color: var(--t); font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
.sheet-btn.primary { background: var(--acc); color: #fff; border-color: transparent; }
.folder-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.folder-chip { font-size: 12px; padding: 4px 10px; border-radius: 20px; border: .5px solid var(--br2); color: var(--t2); background: var(--bg2); cursor: pointer; }
.folder-chip.on { background: var(--acc); color: #fff; border-color: transparent; }

/* toast */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: rgba(20,20,18,.88); color: #fff; padding: 10px 18px; border-radius: 20px; font-size: 13px; z-index: 200; opacity: 0; transition: opacity .25s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="app">

  <!-- 헤더 -->
  <div class="header">
    <button class="header-back" id="header-back" onclick="goBack()">←</button>
    <span class="header-title" id="header-title">후쿠오카 여행 🇯🇵</span>
    <span class="header-sub" id="header-sub"></span>
    <button class="header-action" id="header-action" onclick="headerAction()">+ 폴더</button>
  </div>

  <!-- 탭바 -->
  <div class="tabbar" id="tabbar">
    <div class="tab on" data-tab="home" onclick="switchTab('home')">📁 위시리스트</div>
    <div class="tab" data-tab="search" onclick="switchTab('search')">🔍 검색</div>
  </div>

  <!-- 홈: 폴더 목록 -->
  <div class="screen on" id="screen-home">
    <div class="folder-list" id="folder-list"></div>
  </div>

  <!-- 폴더 상세 -->
  <div class="screen" id="screen-folder">
    <div class="folder-detail">
      <div class="map-container">
        <div id="gmap"></div>
        <div class="map-loading" id="map-loading">지도 불러오는 중...</div>
      </div>
      <div class="place-list-header">
        <span class="place-list-title" id="place-list-title">0곳</span>
        <div class="sort-tabs">
          <button class="sort-tab on" data-sort="added" onclick="setSort(this,'added')">추가순</button>
          <button class="sort-tab" data-sort="votes" onclick="setSort(this,'votes')">투표순</button>
        </div>
      </div>
      <div class="place-list" id="place-list"></div>
    </div>
  </div>

  <!-- 검색 -->
  <div class="screen" id="screen-search">
    <div class="search-bar">
      <div class="search-input-wrap">
        <input class="search-input" id="search-input" type="text" placeholder="장소, 음식점, 관광지 검색..." oninput="onSearchInput(this.value)" autocomplete="off">
        <button class="search-clear" id="search-clear" onclick="clearSearch()">×</button>
      </div>
    </div>
    <div class="search-results" id="search-results">
      <div class="search-hint">
        <span class="search-hint-icon">🔍</span>
        후쿠오카에서 가고 싶은 곳을<br>검색해보세요
      </div>
    </div>
  </div>

</div><!-- /.app -->

<!-- 폴더 생성 모달 -->
<div class="modal-bg" id="folder-modal-bg" onclick="closeFolderModal(event)">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">폴더 만들기</span>
      <button class="modal-close" onclick="document.getElementById('folder-modal-bg').classList.remove('open')">×</button>
    </div>
    <div class="modal-field">
      <label>폴더 이름</label>
      <input class="modal-input" id="folder-name-input" placeholder="예) 맛집, 카페, 숙소...">
    </div>
    <div class="modal-field">
      <label>아이콘</label>
      <div class="emoji-picker" id="emoji-picker"></div>
    </div>
    <div class="modal-field">
      <label>색상</label>
      <div class="color-picker" id="color-picker"></div>
    </div>
    <button class="modal-btn" onclick="createFolder()">만들기</button>
  </div>
</div>

<!-- 폴더 선택 모달 (검색 결과에서 추가시) -->
<div class="modal-bg" id="folder-select-bg" onclick="closeFolderSelectModal(event)">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title" id="add-to-folder-title">위시리스트에 추가</span>
      <button class="modal-close" onclick="document.getElementById('folder-select-bg').classList.remove('open')">×</button>
    </div>
    <div class="folder-select-list" id="folder-select-list"></div>
    <button class="modal-btn" onclick="confirmAddToFolder()" style="margin-top:14px">추가하기</button>
  </div>
</div>

<!-- 장소 상세 바텀시트 -->
<div class="modal-bg" id="place-sheet-bg" onclick="closePlaceSheet(event)">
  <div class="place-sheet" id="place-sheet-content"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
const APP = {
  folders: [],
  currentFolderId: null,
  sortBy: 'added',
  pendingPlace: null,       // 추가 대기 중인 장소
  selectedFolderIds: [],    // 폴더 선택 모달에서 선택된 폴더들
  map: null,
  markers: [],
  searchTimeout: null,
  placesService: null,
  geocoder: null,
};

const EMOJIS = ['🍜','🍣','☕','🏨','🌸','🎮','🛍️','🍺','🌊','🏯','🎭','🍱'];
const COLORS = ['#e8533a','#f2a93b','#3b82f6','#10b981','#8b5cf6','#ec4899','#14b8a6','#f59e0b'];

/* ── 폴더 CRUD ── */
function createFolder() {
  const name = document.getElementById('folder-name-input').value.trim();
  if (!name) { showToast('폴더 이름을 입력해주세요'); return; }
  const emoji = document.querySelector('#emoji-picker .emoji-opt.on')?.dataset.emoji || '📁';
  const color = document.querySelector('#color-picker .color-opt.on')?.dataset.color || COLORS[0];
  APP.folders.push({ id: Date.now(), name, emoji, color, places: [] });
  document.getElementById('folder-modal-bg').classList.remove('open');
  document.getElementById('folder-name-input').value = '';
  renderFolderList();
  showToast(`"${name}" 폴더를 만들었어요`);
}

function renderFolderList() {
  const list = document.getElementById('folder-list');
  if (!APP.folders.length) {
    list.innerHTML = `<div class="empty-state"><span class="empty-icon">📂</span>아직 폴더가 없어요<br>+ 폴더 버튼으로 만들어보세요!</div>`;
    return;
  }
  list.innerHTML = APP.folders.map(f => `
    <div class="folder-card" style="--folder-color:${f.color}" onclick="openFolder(${f.id})">
      <span class="folder-icon">${f.emoji}</span>
      <div class="folder-info">
        <div class="folder-name">${esc(f.name)}</div>
        <div class="folder-meta">${f.places.length}곳 저장됨</div>
      </div>
      <span class="folder-arrow">›</span>
    </div>`).join('') +
    `<button class="folder-add-btn" onclick="openFolderModal()">＋ 새 폴더 만들기</button>`;
}

/* ── 폴더 열기 ── */
function openFolder(folderId) {
  APP.currentFolderId = folderId;
  APP.sortBy = 'added';
  const folder = getFolder(folderId);

  // 헤더 업데이트
  document.getElementById('header-back').classList.add('show');
  document.getElementById('header-title').textContent = `${folder.emoji} ${folder.name}`;
  document.getElementById('header-sub').textContent = '';
  document.getElementById('header-action').textContent = '+ 검색';
  document.getElementById('tabbar').style.display = 'none';

  showScreen('folder');
  renderPlaceList();
  initMap();
}

function goBack() {
  APP.currentFolderId = null;
  document.getElementById('header-back').classList.remove('show');
  document.getElementById('header-title').textContent = '후쿠오카 여행 🇯🇵';
  document.getElementById('header-sub').textContent = '';
  document.getElementById('header-action').textContent = '+ 폴더';
  document.getElementById('tabbar').style.display = 'flex';
  showScreen('home');
  renderFolderList();
}

function headerAction() {
  if (APP.currentFolderId) {
    // 폴더 내에서 → 검색탭으로
    APP.currentFolderId = null;
    document.getElementById('header-back').classList.remove('show');
    document.getElementById('header-title').textContent = '후쿠오카 여행 🇯🇵';
    document.getElementById('header-action').textContent = '+ 폴더';
    document.getElementById('tabbar').style.display = 'flex';
    switchTab('search');
  } else {
    openFolderModal();
  }
}

function getFolder(id) { return APP.folders.find(f => f.id === id); }

/* ── 장소 리스트 렌더 ── */
function setSort(btn, sort) {
  APP.sortBy = sort;
  document.querySelectorAll('.sort-tab').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderPlaceList();
}

function getSortedPlaces(folder) {
  const places = [...folder.places];
  if (APP.sortBy === 'votes') places.sort((a,b) => (b.votes||0) - (a.votes||0));
  else places.sort((a,b) => b.addedAt - a.addedAt);
  return places;
}

function renderPlaceList() {
  const folder = getFolder(APP.currentFolderId);
  if (!folder) return;
  const list = document.getElementById('place-list');
  const title = document.getElementById('place-list-title');
  title.textContent = `${folder.places.length}곳`;

  if (!folder.places.length) {
    list.innerHTML = `<div class="empty-state"><span class="empty-icon">${folder.emoji}</span>아직 저장된 장소가 없어요<br>검색탭에서 추가해보세요</div>`;
    return;
  }

  const sorted = getSortedPlaces(folder);
  list.innerHTML = sorted.map((place, idx) => {
    const rankClass = idx===0?'top1':idx===1?'top2':idx===2?'top3':'';
    const rank = APP.sortBy==='votes' ? `<span class="place-rank ${rankClass}">${idx+1}</span>` : '';
    return `
    <div class="place-item-wrap" id="wrap-${place.id}">
      <div class="delete-bg" onclick="deletePlace(${place.id})"><span>삭제</span></div>
      <div class="place-item" id="item-${place.id}"
        ontouchstart="swipeStart(event,${place.id})"
        ontouchmove="swipeMove(event,${place.id})"
        ontouchend="swipeEnd(event,${place.id})"
        onclick="openPlaceSheet(${place.id})">
        ${rank}
        <div class="place-thumb">${place.photo
          ? `<img src="${esc(place.photo)}" alt="">`
          : place.emoji||'📍'}</div>
        <div class="place-info">
          <div class="place-name">${esc(place.name)}</div>
          <div class="place-cat">${esc(place.category||'')}</div>
          <div class="place-addr">${esc(place.address||'')}</div>
        </div>
        <div class="vote-zone" onclick="event.stopPropagation()">
          <button class="vote-btn" onclick="vote(${place.id},1)">❤️</button>
          <span class="vote-count">${place.votes||0}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  updateMapMarkers();
}

/* ── 투표 ── */
function vote(placeId, delta) {
  const folder = getFolder(APP.currentFolderId);
  const place = folder.places.find(p => p.id === placeId);
  if (!place) return;
  place.votes = Math.max(0, (place.votes||0) + delta);
  renderPlaceList();
}

/* ── 스와이프 삭제 ── */
const swipe = {};
function swipeStart(e, id) {
  swipe[id] = { startX: e.touches[0].clientX, moved: false };
}
function swipeMove(e, id) {
  if (!swipe[id]) return;
  const dx = e.touches[0].clientX - swipe[id].startX;
  if (dx < -10) {
    swipe[id].moved = true;
    const el = document.getElementById('item-' + id);
    if (el) el.style.transform = `translateX(${Math.max(dx, -80)}px)`;
    e.preventDefault();
  }
}
function swipeEnd(e, id) {
  if (!swipe[id]) return;
  const el = document.getElementById('item-' + id);
  if (swipe[id].moved && el) {
    const dx = parseFloat(el.style.transform.replace('translateX(',''))||0);
    if (dx < -40) { el.style.transform = 'translateX(-80px)'; }
    else { el.style.transform = ''; }
  }
  delete swipe[id];
}
function deletePlace(placeId) {
  const folder = getFolder(APP.currentFolderId);
  if (!folder) return;
  folder.places = folder.places.filter(p => p.id !== placeId);
  renderPlaceList();
  showToast('삭제했어요');
}

/* ── 장소 상세 ── */
function openPlaceSheet(placeId) {
  const folder = getFolder(APP.currentFolderId);
  const place = folder?.places.find(p => p.id === placeId);
  if (!place) return;
  const content = document.getElementById('place-sheet-content');
  content.innerHTML = `
    <div style="width:40px;height:4px;background:var(--bg3);border-radius:2px;margin:0 auto 16px"></div>
    <div class="place-sheet-img">${place.photo
      ? `<img src="${esc(place.photo)}" alt="">`
      : `<span style="font-size:40px">${place.emoji||'📍'}</span>`}</div>
    <div class="place-sheet-name">${esc(place.name)}</div>
    <div class="place-sheet-cat">${esc(place.category||'')}</div>
    <div class="place-sheet-addr">📍 ${esc(place.address||'주소 정보 없음')}</div>
    <div class="place-sheet-actions">
      ${place.mapsUrl ? `<button class="sheet-btn" onclick="window.open('${esc(place.mapsUrl)}','_blank')">🗺️ 구글맵</button>` : ''}
      <button class="sheet-btn primary" onclick="vote(${place.id},1);closePlaceSheet();showToast('투표했어요 ❤️')">❤️ 투표 (${place.votes||0})</button>
    </div>`;
  document.getElementById('place-sheet-bg').classList.add('open');
}
function closePlaceSheet(e) {
  if (!e || e.target.id==='place-sheet-bg') document.getElementById('place-sheet-bg').classList.remove('open');
}

/* ══════════════════════════════════════════
   구글맵
══════════════════════════════════════════ */
let mapInitialized = false;

function initMap() {
  if (mapInitialized) { updateMapMarkers(); return; }
  const loading = document.getElementById('map-loading');
  if (!window.google) { loading.textContent = 'API 키를 파일에 넣어주세요'; return; }
  loading.style.display = 'none';
  mapInitialized = true;

  APP.map = new google.maps.Map(document.getElementById('gmap'), {
    center: { lat: 33.5902, lng: 130.4017 }, // 후쿠오카 중심
    zoom: 13,
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: false,
    styles: [
      { featureType:'poi', elementType:'labels', stylers:[{visibility:'off'}] },
      { featureType:'transit', elementType:'labels.icon', stylers:[{visibility:'off'}] },
    ],
  });
  APP.placesService = new google.maps.places.PlacesService(APP.map);
  APP.geocoder = new google.maps.Geocoder();
  updateMapMarkers();
}

function updateMapMarkers() {
  if (!APP.map) return;
  APP.markers.forEach(m => m.setMap(null));
  APP.markers = [];
  const folder = getFolder(APP.currentFolderId);
  if (!folder) return;
  const bounds = new google.maps.LatLngBounds();
  folder.places.forEach((place, idx) => {
    if (!place.lat || !place.lng) return;
    const marker = new google.maps.Marker({
      position: { lat: place.lat, lng: place.lng },
      map: APP.map,
      title: place.name,
      label: { text: String(idx+1), color:'#fff', fontSize:'12px', fontWeight:'700' },
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 16,
        fillColor: '#e8533a',
        fillOpacity: 1,
        strokeColor: '#fff',
        strokeWeight: 2,
      },
    });
    marker.addListener('click', () => openPlaceSheet(place.id));
    APP.markers.push(marker);
    bounds.extend({ lat: place.lat, lng: place.lng });
  });
  if (APP.markers.length > 0) APP.map.fitBounds(bounds, { top:20, right:20, bottom:20, left:20 });
}

/* ══════════════════════════════════════════
   검색 (Google Places API)
══════════════════════════════════════════ */
function onSearchInput(val) {
  const clearBtn = document.getElementById('search-clear');
  clearBtn.classList.toggle('show', val.length > 0);
  clearTimeout(APP.searchTimeout);
  if (!val.trim()) {
    document.getElementById('search-results').innerHTML = `<div class="search-hint"><span class="search-hint-icon">🔍</span>후쿠오카에서 가고 싶은 곳을<br>검색해보세요</div>`;
    return;
  }
  APP.searchTimeout = setTimeout(() => doSearch(val), 400);
}

function doSearch(query) {
  const resultsEl = document.getElementById('search-results');
  resultsEl.innerHTML = `<div class="search-hint"><span class="search-hint-icon">⏳</span>검색 중...</div>`;

  if (!window.google || !APP.placesService) {
    // API 키 없으면 더미 데이터로 UI 미리보기
    showDummyResults(query);
    return;
  }

  const req = {
    query: query + ' 후쿠오카',
    fields: ['place_id','name','formatted_address','geometry','photos','types'],
    locationBias: new google.maps.LatLngBounds(
      { lat:33.52, lng:130.30 }, { lat:33.67, lng:130.52 }
    ),
  };
  APP.placesService.findPlaceFromQuery(req, (results, status) => {
    if (status !== google.maps.places.PlacesServiceStatus.OK || !results?.length) {
      // textSearch fallback
      APP.placesService.textSearch({ query: query + ' 후쿠오카' }, (r2, s2) => {
        if (s2 === google.maps.places.PlacesServiceStatus.OK && r2?.length) renderResults(r2);
        else resultsEl.innerHTML = `<div class="search-hint"><span class="search-hint-icon">😅</span>검색 결과가 없어요</div>`;
      });
      return;
    }
    renderResults(results);
  });
}

function renderResults(results) {
  const resultsEl = document.getElementById('search-results');
  resultsEl.innerHTML = results.slice(0,10).map(place => {
    const photoUrl = place.photos?.[0]?.getUrl({ maxWidth:80, maxHeight:80 });
    const cat = (place.types||[]).find(t => !['point_of_interest','establishment'].includes(t));
    const catLabel = { restaurant:'음식점', food:'음식점', cafe:'카페', lodging:'숙소', tourist_attraction:'관광지', store:'쇼핑', bar:'바' }[cat] || cat?.replace(/_/g,' ') || '';
    const allFolderPlaceIds = APP.folders.flatMap(f => f.places.map(p => p.placeId));
    const isAdded = allFolderPlaceIds.includes(place.place_id);
    return `
    <div class="search-result-item">
      <div class="result-icon">${photoUrl ? `<img src="${photoUrl}" alt="">` : getCatEmoji(cat)}</div>
      <div class="result-info">
        <div class="result-name">${esc(place.name)}</div>
        <div class="result-addr">${esc(catLabel ? catLabel + ' · ' : '')}${esc(place.formatted_address||'')}</div>
      </div>
      <button class="result-add-btn${isAdded?' added':''}"
        onclick='openFolderSelectModal(${JSON.stringify({
          placeId: place.place_id,
          name: place.name,
          address: place.formatted_address||'',
          category: catLabel,
          lat: place.geometry?.location?.lat(),
          lng: place.geometry?.location?.lng(),
          photo: photoUrl||'',
          emoji: getCatEmoji(cat),
          mapsUrl: `https://www.google.com/maps/place/?q=place_id:${place.place_id}`,
        }).replace(/'/g,"&#39;")})'>
        ${isAdded ? '저장됨' : '+ 저장'}
      </button>
    </div>`;
  }).join('');
}

function showDummyResults(query) {
  const dummy = [
    { name:'이치란 라멘 캐널시티점', addr:'福岡市博多区住吉1-2-22', cat:'라멘', emoji:'🍜' },
    { name:'모츠나베 오야마', addr:'福岡市中央区渡辺通1-3-3', cat:'모츠나베', emoji:'🍲' },
    { name:'야나가와 뱃놀이', addr:'福岡県柳川市', cat:'관광지', emoji:'🚣' },
  ].filter(d => d.name.includes(query)||d.cat.includes(query)||true);
  document.getElementById('search-results').innerHTML = `
    <div style="padding:10px 16px;font-size:12px;color:var(--t3);background:var(--bg2)">
      ⚠️ API 키 없이 미리보기 모드예요
    </div>` +
    dummy.map(d => `
    <div class="search-result-item">
      <div class="result-icon">${d.emoji}</div>
      <div class="result-info">
        <div class="result-name">${esc(d.name)}</div>
        <div class="result-addr">${esc(d.cat+' · '+d.addr)}</div>
      </div>
      <button class="result-add-btn" onclick="openFolderSelectModal({name:'${esc(d.name)}',address:'${esc(d.addr)}',category:'${d.cat}',emoji:'${d.emoji}',lat:33.59,lng:130.40})">+ 저장</button>
    </div>`).join('');
}

function getCatEmoji(type) {
  const map = { restaurant:'🍽️', food:'🍜', cafe:'☕', lodging:'🏨', tourist_attraction:'🌸', store:'🛍️', bar:'🍺', park:'🌳', museum:'🏛️', shopping_mall:'🛒' };
  return map[type] || '📍';
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  document.getElementById('search-clear').classList.remove('show');
  document.getElementById('search-results').innerHTML = `<div class="search-hint"><span class="search-hint-icon">🔍</span>후쿠오카에서 가고 싶은 곳을<br>검색해보세요</div>`;
}

/* ── 폴더 선택 모달 ── */
function openFolderSelectModal(placeData) {
  if (typeof placeData === 'string') placeData = JSON.parse(placeData);
  APP.pendingPlace = placeData;
  APP.selectedFolderIds = [];

  const list = document.getElementById('folder-select-list');
  if (!APP.folders.length) {
    list.innerHTML = `<div style="padding:16px;text-align:center;color:var(--t2);font-size:14px">폴더가 없어요. 먼저 폴더를 만들어주세요!</div>`;
  } else {
    list.innerHTML = APP.folders.map(f => `
      <div class="folder-select-item" id="fsi-${f.id}" onclick="toggleFolderSelect(${f.id})">
        <span style="width:10px;height:10px;border-radius:50%;background:${f.color};flex-shrink:0"></span>
        <span>${f.emoji} ${esc(f.name)}</span>
        <span style="margin-left:auto;font-size:12px;color:var(--t3)">${f.places.length}곳</span>
      </div>`).join('');
    // 현재 열려있는 폴더면 자동 선택
    if (APP.currentFolderId) toggleFolderSelect(APP.currentFolderId);
  }
  document.getElementById('add-to-folder-title').textContent = `"${placeData.name}" 저장하기`;
  document.getElementById('folder-select-bg').classList.add('open');
}

function toggleFolderSelect(folderId) {
  const idx = APP.selectedFolderIds.indexOf(folderId);
  if (idx > -1) APP.selectedFolderIds.splice(idx,1);
  else APP.selectedFolderIds.push(folderId);
  document.querySelectorAll('.folder-select-item').forEach(el => el.classList.remove('on'));
  APP.selectedFolderIds.forEach(id => {
    const el = document.getElementById('fsi-'+id);
    if (el) el.classList.add('on');
  });
}

function confirmAddToFolder() {
  if (!APP.selectedFolderIds.length) { showToast('폴더를 선택해주세요'); return; }
  const place = APP.pendingPlace;
  APP.selectedFolderIds.forEach(fid => {
    const folder = getFolder(fid);
    if (!folder) return;
    if (folder.places.find(p => p.placeId === place.placeId && place.placeId)) return; // 중복 방지
    folder.places.push({ ...place, id: Date.now() + Math.random(), addedAt: Date.now(), votes: 0 });
  });
  document.getElementById('folder-select-bg').classList.remove('open');
  showToast(`${APP.selectedFolderIds.length}개 폴더에 저장했어요 ✓`);
  renderFolderList();
  if (APP.currentFolderId) renderPlaceList();
}

function closeFolderSelectModal(e) {
  if (e.target.id==='folder-select-bg') document.getElementById('folder-select-bg').classList.remove('open');
}

/* ── 폴더 생성 모달 ── */
function openFolderModal() {
  const ep = document.getElementById('emoji-picker');
  ep.innerHTML = EMOJIS.map((e,i) => `<div class="emoji-opt${i===0?' on':''}" data-emoji="${e}" onclick="pickEmoji(this)">${e}</div>`).join('');
  const cp = document.getElementById('color-picker');
  cp.innerHTML = COLORS.map((c,i) => `<div class="color-opt${i===0?' on':''}" data-color="${c}" style="background:${c}" onclick="pickColor(this)"></div>`).join('');
  document.getElementById('folder-modal-bg').classList.add('open');
  setTimeout(() => document.getElementById('folder-name-input').focus(), 300);
}
function pickEmoji(el) { document.querySelectorAll('.emoji-opt').forEach(e=>e.classList.remove('on')); el.classList.add('on'); }
function pickColor(el) { document.querySelectorAll('.color-opt').forEach(e=>e.classList.remove('on')); el.classList.add('on'); }
function closeFolderModal(e) { if(e.target.id==='folder-modal-bg') document.getElementById('folder-modal-bg').classList.remove('open'); }

/* ── 화면 전환 ── */
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  document.getElementById('screen-'+name).classList.add('on');
}
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.querySelector(`.tab[data-tab="${name}"]`).classList.add('on');
  showScreen(name);
  if (name === 'search') setTimeout(() => document.getElementById('search-input').focus(), 200);
}

/* ── UTIL ── */
function esc(s) {
  return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

/* ── INIT ── */
renderFolderList();
</script>

<script>
  (async () => {
    try {
      const res = await fetch('/api/maps-key');
      const { key } = await res.json();
      if (key) {
        const s = document.createElement('script');
        s.src = `https://maps.googleapis.com/maps/api/js?key=${key}&libraries=places&language=ko`;
        s.async = true;
        document.head.appendChild(s);
      }
    } catch(e) { console.warn('Maps key fetch failed:', e); }
  })();
</script>
