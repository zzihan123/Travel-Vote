<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>여행 투표</title>

<script>
  const GOOGLE_MAPS_KEY = '';  // ✅ Google Maps API 키 (선택 — 없으면 텍스트 입력 모드)
  const SUPABASE_URL    = '';  // ✅ https://xxxx.supabase.co (선택)
  const SUPABASE_ANON   = '';  // ✅ eyJhbGci... (선택)
  const USE_SUPABASE    = !!(SUPABASE_URL && SUPABASE_ANON);
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --bg:#fff; --bg2:#f7f7f5; --bg3:#efefec;
  --t:#1a1a1a; --t2:#6b6b68; --t3:#a8a8a4;
  --br:rgba(0,0,0,.1); --br2:rgba(0,0,0,.18);
  --acc:#1a1a1a; --gold:#e8a800; --ai:#5046e5;
  --bed-bg:#eeedfe; --bed-c:#3c3489;
  --bath-bg:#e1f5ee; --bath-c:#085041;
  --r:10px; --rs:6px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1a; --bg2:#252522; --bg3:#2e2e2b;
    --t:#f0ede8; --t2:#9a9a94; --t3:#5e5e5a;
    --br:rgba(255,255,255,.1); --br2:rgba(255,255,255,.2); --acc:#f0ede8;
    --bed-bg:#26215c; --bed-c:#afa9ec; --bath-bg:#04342c; --bath-c:#5dcaa5;
  }
}
html,body{ height:100%; font-family:-apple-system,'Pretendard','Apple SD Gothic Neo',sans-serif; }
body{ background:var(--bg2); color:var(--t); -webkit-font-smoothing:antialiased; }
.app{ max-width:480px; margin:0 auto; background:var(--bg); min-height:100vh; display:flex; flex-direction:column; }

/* topbar */
.topbar{ padding:12px 16px 10px; border-bottom:.5px solid var(--br); background:var(--bg); position:sticky; top:0; z-index:20; }
.tb1{ display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.app-title{ font-size:15px; font-weight:600; flex:1; }
.db-badge{ font-size:11px; padding:3px 8px; border-radius:20px; }
.db-local{ background:var(--bg3); color:var(--t2); }
.db-live{ background:#e1f5ee; color:#085041; }
.db-err{ background:#fcebeb; color:#a32d2d; }
.tb2{ display:flex; align-items:center; gap:6px; }
.me-lbl{ font-size:12px; color:var(--t2); white-space:nowrap; }
.pill-wrap{ display:flex; gap:5px; flex-wrap:wrap; flex:1; }
.pill{ font-size:12px; padding:4px 11px; border-radius:20px; border:.5px solid var(--br2); background:var(--bg); color:var(--t2); cursor:pointer; white-space:nowrap; transition:background .12s; }
.pill.on{ background:var(--acc); color:var(--bg); border-color:transparent; }
.add-mb{ font-size:12px; padding:4px 10px; border-radius:20px; border:.5px dashed var(--br2); background:none; color:var(--t3); cursor:pointer; }

/* sortbar */
.sortbar{ display:flex; gap:6px; padding:8px 16px; border-bottom:.5px solid var(--br); background:var(--bg); overflow-x:auto; }
.s-btn{ font-size:12px; padding:4px 12px; border-radius:20px; border:.5px solid var(--br); background:none; color:var(--t2); cursor:pointer; white-space:nowrap; }
.s-btn.on{ background:var(--acc); color:var(--bg); border-color:transparent; }

/* list */
.list-wrap{ flex:1; }
.list-empty{ padding:44px 20px; text-align:center; color:var(--t2); font-size:14px; }
.row{ border-bottom:.5px solid var(--br); }
.row.winner{ background:#fdf5e0; }
@media(prefers-color-scheme:dark){ .row.winner{ background:#2a2310; } }
.row-name{ padding:12px 14px 5px; display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
.row-title{ font-size:14px; font-weight:600; color:var(--t); line-height:1.35; flex:1; }
.row-price{ font-size:14px; font-weight:600; color:var(--t); white-space:nowrap; padding-top:1px; }
.row-info{ padding:0 14px 12px; display:flex; align-items:center; gap:10px; }
.thumb-wrap{ width:44px; height:44px; border-radius:var(--rs); overflow:hidden; background:var(--bg3); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.thumb-wrap img{ width:100%; height:100%; object-fit:cover; }
.thumb-icon{ font-size:20px; }
.chips-row{ display:flex; gap:5px; flex-wrap:wrap; align-items:center; }
.chip{ display:inline-flex; align-items:center; gap:3px; font-size:11px; padding:3px 8px; border-radius:20px; white-space:nowrap; font-weight:500; }
.chip-bed{ background:var(--bed-bg); color:var(--bed-c); }
.chip-bath{ background:var(--bath-bg); color:var(--bath-c); }
/* 역 칩 — 노선색은 JS에서 인라인으로 */
.chip-sta{ color:#fff; }
.row-by{ font-size:11px; color:var(--t3); margin-top:3px; }
.link-ico{ color:#378add; font-size:11px; margin-left:3px; text-decoration:none; }
.win-badge{ font-size:10px; background:var(--gold); color:#fff; padding:2px 6px; border-radius:10px; margin-left:5px; vertical-align:middle; }
.heart-zone{ display:flex; flex-direction:column; align-items:center; gap:1px; flex-shrink:0; }
.heart-btn{ background:none; border:none; cursor:pointer; font-size:20px; line-height:1; padding:2px; }
.heart-count{ font-size:11px; font-weight:500; color:var(--t2); }
.row-memo{ font-size:11px; color:var(--t2); padding:0 14px 10px; line-height:1.4; }
.add-btn{ width:100%; padding:14px; border:none; border-top:.5px dashed var(--br2); background:none; color:var(--t2); font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; }
.add-btn:hover{ background:var(--bg2); }

/* modal */
.modal-bg{ display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:100; align-items:flex-end; justify-content:center; }
.modal-bg.open{ display:flex; }
.modal{ background:var(--bg); border-radius:20px 20px 0 0; padding:20px 20px 40px; width:100%; max-width:480px; max-height:92vh; overflow-y:auto; }
.modal-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.modal-title{ font-size:16px; font-weight:600; color:var(--t); }
.modal-close{ background:none; border:none; font-size:24px; cursor:pointer; color:var(--t2); line-height:1; }
.field{ margin-bottom:13px; }
.field label{ display:block; font-size:12px; color:var(--t2); margin-bottom:5px; }
input[type=text],input[type=number],input[type=url],textarea{
  width:100%; padding:10px 12px; font-size:14px;
  border:.5px solid var(--br2); border-radius:var(--rs);
  background:var(--bg); color:var(--t);
  -webkit-appearance:none; outline:none; transition:border-color .15s;
}
input:focus,textarea:focus{ border-color:var(--acc); }
textarea{ height:56px; resize:none; }
.chip-sel{ display:flex; gap:6px; flex-wrap:wrap; }
.chip-opt{ padding:7px 14px; border:.5px solid var(--br2); border-radius:20px; font-size:13px; cursor:pointer; background:var(--bg); color:var(--t2); transition:background .12s; }
.chip-opt.on{ background:var(--acc); color:var(--bg); border-color:transparent; }
.upload-box{ border:.5px dashed var(--br2); border-radius:var(--r); padding:18px; text-align:center; cursor:pointer; background:var(--bg2); color:var(--t2); font-size:13px; }
.upload-box.has-img{ padding:0; overflow:hidden; }
.upload-box.has-img img{ width:100%; height:120px; object-fit:cover; display:block; border-radius:var(--r); }
.sub-btn{ width:100%; padding:14px; background:var(--acc); color:var(--bg); border:none; border-radius:var(--r); font-size:15px; font-weight:600; cursor:pointer; margin-top:6px; }

/* AI 섹션 */
.ai-section{ background:var(--bg2); border-radius:var(--r); padding:14px; margin-bottom:14px; }
.ai-section-title{ font-size:12px; font-weight:600; color:var(--ai); margin-bottom:10px; }
.ai-url-row{ display:flex; gap:8px; }
.ai-url-row input{ flex:1; border-color:var(--ai); }
.ai-go-btn{ padding:0 14px; background:var(--ai); color:#fff; border:none; border-radius:var(--rs); font-size:13px; font-weight:500; cursor:pointer; white-space:nowrap; }
.ai-go-btn:disabled{ opacity:.45; cursor:not-allowed; }
.ai-status{ font-size:12px; margin-top:8px; padding:7px 10px; border-radius:var(--rs); display:none; line-height:1.4; }
.ai-status.loading{ display:block; background:#eeedfe; color:#3c3489; }
.ai-status.ok{ display:block; background:#e1f5ee; color:#085041; }
.ai-status.err{ display:block; background:#fcebeb; color:#a32d2d; }
.ai-divider{ display:flex; align-items:center; gap:8px; margin-bottom:13px; color:var(--t3); font-size:12px; }
.ai-divider::before,.ai-divider::after{ content:''; flex:1; height:.5px; background:var(--br2); }

/* 역/지도 선택 */
.station-wrap{ position:relative; }
.station-search-row{ display:flex; gap:8px; }
.station-search-row input{ flex:1; }
.map-btn{ padding:0 12px; height:40px; background:var(--bg2); border:.5px solid var(--br2); border-radius:var(--rs); font-size:13px; cursor:pointer; color:var(--t2); white-space:nowrap; flex-shrink:0; display:flex; align-items:center; gap:4px; }
.map-btn:hover{ background:var(--bg3); }
.station-results{ position:absolute; top:100%; left:0; right:0; background:var(--bg); border:.5px solid var(--br2); border-radius:var(--rs); box-shadow:0 4px 16px rgba(0,0,0,.12); z-index:50; max-height:200px; overflow-y:auto; margin-top:4px; }
.station-result-item{ padding:10px 12px; cursor:pointer; font-size:13px; color:var(--t); border-bottom:.5px solid var(--br); display:flex; align-items:center; gap:8px; }
.station-result-item:last-child{ border-bottom:none; }
.station-result-item:hover{ background:var(--bg2); }
.sta-dot{ width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.sta-name{ font-weight:500; }
.sta-line{ font-size:11px; color:var(--t2); }
/* 선택된 역 표시 */
.station-selected{ display:none; align-items:center; gap:6px; margin-top:6px; padding:7px 10px; background:var(--bg2); border-radius:var(--rs); font-size:13px; }
.station-selected.show{ display:flex; }
.station-selected-dot{ width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.station-clear{ margin-left:auto; background:none; border:none; color:var(--t3); cursor:pointer; font-size:16px; line-height:1; padding:0 2px; }

/* 지도 모달 */
.map-modal-bg{ display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:200; align-items:flex-end; justify-content:center; }
.map-modal-bg.open{ display:flex; }
.map-modal{ background:var(--bg); border-radius:20px 20px 0 0; width:100%; max-width:480px; height:85vh; display:flex; flex-direction:column; }
.map-modal-head{ padding:16px 20px 12px; display:flex; align-items:center; justify-content:space-between; border-bottom:.5px solid var(--br); }
.map-modal-title{ font-size:15px; font-weight:600; }
.map-search-bar{ padding:10px 14px; border-bottom:.5px solid var(--br); }
.map-search-bar input{ width:100%; padding:9px 12px; font-size:14px; border:.5px solid var(--br2); border-radius:var(--rs); background:var(--bg); color:var(--t); outline:none; }
#gmap{ flex:1; width:100%; }
.map-no-key{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; padding:30px; text-align:center; color:var(--t2); font-size:14px; }
.map-station-list{ flex:1; overflow-y:auto; }
.map-sta-item{ padding:12px 16px; border-bottom:.5px solid var(--br); cursor:pointer; display:flex; align-items:center; gap:10px; }
.map-sta-item:hover{ background:var(--bg2); }
.map-sta-dot{ width:12px; height:12px; border-radius:50%; flex-shrink:0; }
.map-sta-info .name{ font-size:14px; font-weight:500; color:var(--t); }
.map-sta-info .line{ font-size:12px; color:var(--t2); margin-top:2px; }
.map-confirm-btn{ margin:12px 14px; padding:13px; background:var(--acc); color:var(--bg); border:none; border-radius:var(--r); font-size:15px; font-weight:600; cursor:pointer; }
.map-confirm-btn:disabled{ opacity:.4; cursor:not-allowed; }

/* toast */
.toast{ position:fixed; bottom:28px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,.82); color:#fff; padding:10px 18px; border-radius:20px; font-size:13px; z-index:300; opacity:0; transition:opacity .25s; pointer-events:none; white-space:nowrap; }
.toast.show{ opacity:1; }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="tb1">
      <span class="app-title">✈️ 여행 투표</span>
      <span class="db-badge db-local" id="db-badge">로컬 모드</span>
    </div>
    <div class="tb2">
      <span class="me-lbl">나:</span>
      <div class="pill-wrap" id="pill-wrap"></div>
      <button class="add-mb" onclick="addMemberPrompt()">+ 멤버</button>
    </div>
  </div>

  <div class="sortbar">
    <button class="s-btn on" data-sort="recent"  onclick="setSort(this)">최신순</button>
    <button class="s-btn"    data-sort="hearts"  onclick="setSort(this)">하트순</button>
    <button class="s-btn"    data-sort="price"   onclick="setSort(this)">가격순</button>
    <button class="s-btn"    data-sort="station" onclick="setSort(this)">역 이름순</button>
  </div>

  <div class="list-wrap">
    <div id="list-body"></div>
    <button class="add-btn" onclick="openModal()">
      <span style="font-size:16px">＋</span> 숙소 추가
    </button>
  </div>
</div>

<!-- 숙소 추가 모달 -->
<div class="modal-bg" id="modal-bg" onclick="bgClick(event)">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">숙소 추가</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>

    <div class="ai-section">
      <div class="ai-section-title">✦ AI 자동입력</div>
      <div class="ai-url-row">
        <input type="url" id="ai-url" placeholder="아고다 링크 붙여넣기...">
        <button class="ai-go-btn" id="ai-btn" onclick="fetchFromAI()">분석</button>
      </div>
      <div class="ai-status" id="ai-status"></div>
    </div>
    <div class="ai-divider">또는 직접 입력</div>

    <div class="field">
      <label>내 이름</label>
      <div class="chip-sel" id="modal-me-chips"></div>
    </div>
    <div class="field">
      <label>숙소 이름 <span style="color:#e24b4a">*</span></label>
      <input type="text" id="f-name" placeholder="예) 그랜드 베이스 후쿠오카">
    </div>
    <div class="field">
      <label>침대 유형</label>
      <div class="chip-sel" id="bed-chips">
        <div class="chip-opt on" onclick="pickChip('bed',this,'더블')">더블</div>
        <div class="chip-opt"   onclick="pickChip('bed',this,'각침대')">각침대</div>
        <div class="chip-opt"   onclick="pickChip('bed',this,'벙커침대')">벙커침대</div>
        <div class="chip-opt"   onclick="pickChip('bed',this,'기타')">기타</div>
      </div>
    </div>
    <div class="field">
      <label>화장실 유형</label>
      <div class="chip-sel" id="bath-chips">
        <div class="chip-opt on" onclick="pickChip('bath',this,'방안(인실)')">방안(인실)</div>
        <div class="chip-opt"   onclick="pickChip('bath',this,'셰어드')">셰어드</div>
      </div>
    </div>

    <!-- 역 선택 -->
    <div class="field">
      <label>가까운 역 <span style="font-size:11px;color:var(--t3)">(검색 또는 지도에서 선택)</span></label>
      <div class="station-wrap">
        <div class="station-search-row">
          <input type="text" id="f-station-search" placeholder="역 이름 검색..." oninput="searchStation(this.value)" autocomplete="off">
          <button class="map-btn" onclick="openMapModal()">🗺️ 지도</button>
        </div>
        <div class="station-results" id="station-results" style="display:none"></div>
        <div class="station-selected" id="station-selected">
          <div class="station-selected-dot" id="station-sel-dot"></div>
          <span id="station-sel-text"></span>
          <button class="station-clear" onclick="clearStation()">×</button>
        </div>
      </div>
    </div>

    <div class="field">
      <label>총 금액 (원)</label>
      <input type="number" id="f-price" placeholder="예) 150000">
    </div>
    <div class="field">
      <label>링크</label>
      <input type="url" id="f-url" placeholder="https://agoda.com/...">
    </div>
    <div class="field">
      <label>이미지</label>
      <div class="upload-box" id="upload-box" onclick="document.getElementById('img-file').click()">
        <span style="font-size:24px;display:block;margin-bottom:4px">🖼️</span>탭해서 사진 선택
      </div>
      <input type="file" id="img-file" accept="image/*" style="display:none" onchange="handleImg(event)">
      <input type="url" id="f-img-url" placeholder="또는 이미지 URL" style="margin-top:8px;font-size:13px" oninput="previewUrl(this.value)">
    </div>
    <div class="field">
      <label>메모 (선택)</label>
      <textarea id="f-memo" placeholder="특이사항, 장단점 등"></textarea>
    </div>
    <button class="sub-btn" onclick="addItem()">추가하기</button>
  </div>
</div>

<!-- 지도 모달 -->
<div class="map-modal-bg" id="map-modal-bg" onclick="mapBgClick(event)">
  <div class="map-modal">
    <div class="map-modal-head">
      <span class="map-modal-title">📍 역 선택</span>
      <button class="modal-close" onclick="closeMapModal()">×</button>
    </div>
    <div class="map-search-bar">
      <input type="text" id="map-search-input" placeholder="역 이름으로 검색..." oninput="filterMapList(this.value)">
    </div>
    <div class="map-station-list" id="map-station-list"></div>
    <button class="map-confirm-btn" id="map-confirm-btn" onclick="confirmMapStation()" disabled>선택하기</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════════
   후쿠오카 지하철 노선 데이터
══════════════════════════════════════════ */
const FUKUOKA_LINES = [
  { id:'kuko',  name:'공항선',   color:'#e60012', stations:['姪浜','室見','藤崎','西新','唐人町','大濠公園','赤坂','天神','中洲川端','祇園','博多','東比恵','福岡空港'] },
  { id:'hakozaki', name:'박스자키선', color:'#009944', stations:['中洲川端','呉服町','千代県庁口','馬出九大病院前','箱崎宮前','箱崎九大前','貝塚'] },
  { id:'nanakuma', name:'나나쿠마선', color:'#00a0e9', stations:['天神南','薬院大通','薬院','桜坂','六本松','別府','七隈','梅林','野芥','賀茂','次郎丸','橋本'] },
  { id:'nishitetsu', name:'니시테츠 오무타선', color:'#f39800', stations:['福岡（天神）','薬院','大橋','竹下','春日原','下大利','白木原','水城','太宰府','都府楼前','二日市','朝倉街道','桜台','筑紫','小郡'] },
  { id:'jr_kagoshima', name:'JR 가고시마선', color:'#cc0000', stations:['博多','竹下','笹原','南福岡','春日','大野城','水城','都府楼南','二日市','天拝山','原田'] },
  { id:'jr_chikuhi', name:'JR 치쿠히선', color:'#0068b7', stations:['博多','姪浜','下山門','今宿','周船寺','九大学研都市','波多江','糸島高校前','美咲が丘','筑前前原'] },
];

// 역 목록 flat하게 만들기 (중복 제거, 노선색 매핑)
const ALL_STATIONS = [];
const stationLineMap = {}; // 역명 → { lineName, color }
FUKUOKA_LINES.forEach(line => {
  line.stations.forEach(sta => {
    if (!stationLineMap[sta]) {
      stationLineMap[sta] = { lineName: line.name, color: line.color, lineId: line.id };
      ALL_STATIONS.push({ name: sta, lineName: line.name, color: line.color, lineId: line.id });
    }
  });
});

// 한글 역명 매핑 (주요 역)
const STA_KR = {
  '博多':'하카타역', '天神':'텐진역', '中洲川端':'나카스카와바타역',
  '福岡空港':'후쿠오카공항역', '姪浜':'메이노하마역', '西新':'니시진역',
  '大濠公園':'오호리코엔역', '赤坂':'아카사카역', '唐人町':'도진마치역',
  '藤崎':'후지사키역', '室見':'무로미역', '東比恵':'히가시히에역',
  '祇園':'기온역', '呉服町':'고후쿠마치역', '貝塚':'카이즈카역',
  '天神南':'텐진미나미역', '薬院':'야쿠인역', '薬院大通':'야쿠인오도리역',
  '六本松':'롯폰마츠역', '桜坂':'사쿠라자카역', '橋本':'하시모토역',
  '福岡（天神）':'후쿠오카(텐진)역', '大橋':'오하시역', '竹下':'타케시타역',
  '二日市':'후츠카이치역',
};

function getStaLabel(name) {
  return STA_KR[name] ? `${STA_KR[name]} (${name})` : name;
}

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
const S = {
  items:[], members:['지희','민준','수연'],
  me:'', sort:'recent',
  bed:'더블', bath:'방안(인실)', img:'',
  station: null, // { name, lineName, color }
  mapSelectedStation: null,
};

/* ── 역 검색 (모달 내 텍스트) ── */
function searchStation(query) {
  const box = document.getElementById('station-results');
  if (!query.trim()) { box.style.display='none'; return; }
  const q = query.toLowerCase();
  const matches = ALL_STATIONS.filter(s =>
    s.name.toLowerCase().includes(q) ||
    getStaLabel(s.name).toLowerCase().includes(q) ||
    s.lineName.includes(query)
  ).slice(0, 8);
  if (!matches.length) { box.style.display='none'; return; }
  box.innerHTML = matches.map(s => `
    <div class="station-result-item" onclick="selectStation(${JSON.stringify(s).replace(/"/g,'&quot;')})">
      <span class="sta-dot" style="background:${s.color}"></span>
      <span>
        <span class="sta-name">${getStaLabel(s.name)}</span>
        <span class="sta-line"> — ${s.lineName}</span>
      </span>
    </div>`).join('');
  box.style.display = 'block';
}

function selectStation(s) {
  S.station = s;
  document.getElementById('f-station-search').value = getStaLabel(s.name);
  document.getElementById('station-results').style.display = 'none';
  showStationSelected(s);
}

function showStationSelected(s) {
  const el = document.getElementById('station-selected');
  document.getElementById('station-sel-dot').style.background = s.color;
  document.getElementById('station-sel-text').textContent = `${getStaLabel(s.name)} · ${s.lineName}`;
  el.classList.add('show');
}

function clearStation() {
  S.station = null;
  document.getElementById('f-station-search').value = '';
  document.getElementById('station-selected').classList.remove('show');
}

/* ── 지도 모달 (역 리스트 방식) ── */
function openMapModal() {
  document.getElementById('map-modal-bg').classList.add('open');
  document.getElementById('map-search-input').value = '';
  S.mapSelectedStation = null;
  document.getElementById('map-confirm-btn').disabled = true;
  renderMapList(ALL_STATIONS);
}
function closeMapModal() { document.getElementById('map-modal-bg').classList.remove('open'); }
function mapBgClick(e) { if(e.target.id==='map-modal-bg') closeMapModal(); }

function filterMapList(q) {
  const filtered = q.trim()
    ? ALL_STATIONS.filter(s =>
        s.name.toLowerCase().includes(q.toLowerCase()) ||
        getStaLabel(s.name).toLowerCase().includes(q.toLowerCase()) ||
        s.lineName.includes(q))
    : ALL_STATIONS;
  renderMapList(filtered);
}

function renderMapList(stations) {
  // 노선별 그룹핑
  const groups = {};
  stations.forEach(s => {
    if (!groups[s.lineId]) groups[s.lineId] = { ...FUKUOKA_LINES.find(l=>l.id===s.lineId), stations:[] };
    groups[s.lineId].stations.push(s);
  });
  const list = document.getElementById('map-station-list');
  list.innerHTML = Object.values(groups).map(g => `
    <div style="padding:8px 16px 4px; font-size:11px; font-weight:600; color:${g.color}; background:var(--bg2); display:flex; align-items:center; gap:6px;">
      <span style="width:8px;height:8px;border-radius:50%;background:${g.color};display:inline-block"></span>
      ${g.name}
    </div>
    ${g.stations.map(s => `
      <div class="map-sta-item" id="msi-${s.name}" onclick="selectMapStation(${JSON.stringify(s).replace(/"/g,'&quot;')})">
        <span class="map-sta-dot" style="background:${s.color}"></span>
        <div class="map-sta-info">
          <div class="name">${getStaLabel(s.name)}</div>
          <div class="line">${s.lineName}</div>
        </div>
      </div>`).join('')}
  `).join('');
}

function selectMapStation(s) {
  S.mapSelectedStation = s;
  // 하이라이트
  document.querySelectorAll('.map-sta-item').forEach(el => el.style.background='');
  const el = document.getElementById('msi-' + s.name);
  if (el) el.style.background = s.color + '22';
  document.getElementById('map-confirm-btn').disabled = false;
}

function confirmMapStation() {
  if (!S.mapSelectedStation) return;
  selectStation(S.mapSelectedStation);
  closeMapModal();
}

/* ── AI 자동입력 ── */
async function fetchFromAI() {
  const url = document.getElementById('ai-url').value.trim();
  if (!url) { showToast('URL을 먼저 입력해주세요'); return; }
  const btn = document.getElementById('ai-btn');
  btn.disabled = true;
  setAiStatus('loading', '✦ AI가 숙소 정보를 분석하고 있어요...');
  try {
    const res = await fetch('/api/fetch-stay', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ url }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `서버 오류 ${res.status}`);
    fillForm(data, url);
    setAiStatus('ok', '✓ 정보를 불러왔어요. 역은 아래에서 선택해주세요.');
  } catch(e) {
    setAiStatus('err', '⚠️ ' + e.message + ' — 직접 입력해주세요.');
  } finally { btn.disabled = false; }
}

function fillForm(info, originalUrl) {
  if (info.name)  document.getElementById('f-name').value  = info.name;
  if (info.price) document.getElementById('f-price').value = info.price;
  if (info.memo)  document.getElementById('f-memo').value  = info.memo;
  document.getElementById('f-url').value = originalUrl;
  if (info.bed) {
    const matched = ['더블','각침대','벙커침대'].find(k=>info.bed.includes(k))||'기타';
    S.bed = matched;
    document.querySelectorAll('#bed-chips .chip-opt').forEach(el=>el.classList.toggle('on',el.textContent.trim()===matched));
  }
  if (info.bath) {
    const priv = info.bath.includes('방안')||info.bath.includes('인실');
    S.bath = priv ? '방안(인실)' : '셰어드';
    document.querySelectorAll('#bath-chips .chip-opt').forEach(el=>el.classList.toggle('on',el.textContent.trim()===S.bath));
  }
  if (info.img) { document.getElementById('f-img-url').value=info.img; S.img=info.img; setPreview(info.img); }
  // AI가 역 이름 돌려줬으면 자동 매칭 시도
  if (info.station) {
    const q = info.station.replace(/역|駅/g,'').trim();
    const match = ALL_STATIONS.find(s => s.name.includes(q) || getStaLabel(s.name).includes(q));
    if (match) { selectStation(match); }
    else { document.getElementById('f-station-search').value = info.station; }
  }
}

function setAiStatus(state, msg) {
  const el = document.getElementById('ai-status');
  el.className = 'ai-status' + (state?' '+state:'');
  el.textContent = msg;
}

/* ── SUPABASE ── */
let db = null;
async function initSupabase() {
  if (!USE_SUPABASE) { setDbBadge('local'); return; }
  try {
    db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
    const { error } = await db.from('stays').select('id').limit(1);
    if (error) throw error;
    setDbBadge('live');
    await loadFromDb();
    db.channel('stays-ch')
      .on('postgres_changes',{event:'*',schema:'public',table:'stays'},loadFromDb)
      .subscribe();
  } catch(e) { console.warn('Supabase 연결 실패:',e.message); setDbBadge('err'); db=null; }
}
async function loadFromDb() {
  if (!db) return;
  const { data } = await db.from('stays').select('*').order('created_at',{ascending:false});
  S.items = (data||[]).map(r=>({
    id:r.id, ts:new Date(r.created_at).getTime(),
    name:r.name, bed:r.bed, bath:r.bath,
    station:r.station, stationColor:r.station_color, stationLine:r.station_line,
    price:r.price, url:r.url||'', img:r.img||'', memo:r.memo||'',
    by:r.added_by||'', hearts:r.hearts||[],
  }));
  renderTable();
}
async function dbInsert(item) {
  if (!db) return;
  await db.from('stays').insert([{
    name:item.name, bed:item.bed, bath:item.bath,
    station:item.station, station_color:item.stationColor, station_line:item.stationLine,
    price:item.price||null, url:item.url, img:item.img, memo:item.memo,
    added_by:item.by, hearts:item.hearts,
  }]);
}
async function dbUpdateHearts(item) {
  if (!db) return;
  await db.from('stays').update({hearts:item.hearts}).eq('id',item.id);
}
function setDbBadge(s) {
  const el=document.getElementById('db-badge');
  el.className='db-badge '+{local:'db-local',live:'db-live',err:'db-err'}[s];
  el.textContent={local:'로컬 모드',live:'🟢 실시간 연결',err:'⚠️ 연결 오류'}[s];
}

/* ── MEMBERS ── */
function renderPills() {
  document.getElementById('pill-wrap').innerHTML =
    S.members.map(m=>`<div class="pill${S.me===m?' on':''}" onclick="setMe('${esc(m)}')">${esc(m)}</div>`).join('');
  const mc=document.getElementById('modal-me-chips');
  if(mc) mc.innerHTML=S.members.map(m=>`<div class="chip-opt${S.me===m?' on':''}" onclick="setMeM('${esc(m)}')">${esc(m)}</div>`).join('');
}
function setMe(m)  { S.me=S.me===m?'':m; renderPills(); renderTable(); }
function setMeM(m) { S.me=S.me===m?'':m; renderPills(); }
function addMemberPrompt() {
  const n=prompt('새 멤버 이름'); if(!n||!n.trim()) return;
  if(!S.members.includes(n.trim())) S.members.push(n.trim());
  S.me=n.trim(); renderPills(); renderTable();
}

/* ── SORT & RENDER ── */
function setSort(btn) {
  S.sort=btn.dataset.sort;
  document.querySelectorAll('.s-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on'); renderTable();
}
function getSorted() {
  const a=[...S.items];
  if      (S.sort==='hearts')  a.sort((x,y)=>y.hearts.length-x.hearts.length);
  else if (S.sort==='price')   a.sort((x,y)=>(x.price||0)-(y.price||0));
  else if (S.sort==='station') a.sort((x,y)=>(x.station||'').localeCompare(y.station||'','ko'));
  else                         a.sort((x,y)=>(y.ts||y.id)-(x.ts||x.id));
  return a;
}
function renderTable() {
  const body=document.getElementById('list-body');
  const sorted=getSorted();
  if (!sorted.length) {
    body.innerHTML=`<div class="list-empty"><span style="font-size:36px;display:block;margin-bottom:10px">🏨</span>숙소를 추가해보세요</div>`;
    return;
  }
  const topId=(S.sort==='hearts'&&sorted[0].hearts.length>0)?sorted[0].id:null;
  body.innerHTML=sorted.map(item=>{
    const hearted=item.hearts.includes(S.me);
    const isWin=item.id===topId;
    const price=item.price?item.price.toLocaleString('ko-KR')+'원':'—';
    const staColor=item.stationColor||'#888';
    const staChip=item.station
      ?`<span class="chip chip-sta" style="background:${staColor}">🚇 ${esc(item.station)}</span>`:'';
    return `<div class="row${isWin?' winner':''}">
  <div class="row-name">
    <span class="row-title">${esc(item.name)}${isWin?'<span class="win-badge">🏆 1위</span>':''}</span>
    <span class="row-price">${price}</span>
  </div>
  <div class="row-info">
    <div class="thumb-wrap">${item.img
      ?`<img src="${esc(item.img)}" alt="${esc(item.name)}" loading="lazy">`
      :`<span class="thumb-icon">🏨</span>`}</div>
    <div style="flex:1;min-width:0">
      <div class="chips-row">
        ${item.bed  ?`<span class="chip chip-bed">${esc(item.bed)}</span>`:''}
        ${item.bath ?`<span class="chip chip-bath">${esc(item.bath)}</span>`:''}
        ${staChip}
      </div>
      <div class="row-by">by ${esc(item.by||'—')}${item.url?`<a href="${esc(item.url)}" class="link-ico" target="_blank" rel="noopener">↗</a>`:''}</div>
    </div>
    <div class="heart-zone">
      <button class="heart-btn" onclick="toggleHeart(${item.id})" aria-label="${hearted?'하트 취소':'하트 추가'}">${hearted?'❤️':'🤍'}</button>
      <span class="heart-count">${item.hearts.length}</span>
    </div>
  </div>
  ${item.memo?`<div class="row-memo">${esc(item.memo)}</div>`:''}
</div>`;
  }).join('');
}

/* ── HEART ── */
async function toggleHeart(id) {
  if (!S.me) { showToast('먼저 이름을 선택해주세요'); return; }
  const item=S.items.find(i=>i.id===id); if(!item) return;
  const idx=item.hearts.indexOf(S.me);
  if(idx>-1) item.hearts.splice(idx,1); else item.hearts.push(S.me);
  renderTable(); await dbUpdateHearts(item);
}

/* ── MODAL ── */
function openModal()  { document.getElementById('modal-bg').classList.add('open'); renderPills(); }
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); resetForm(); }
function bgClick(e)   { if(e.target.id==='modal-bg') closeModal(); }
function resetForm() {
  ['f-name','f-price','f-url','f-img-url','f-memo','ai-url','f-station-search']
    .forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  S.img=''; S.bed='더블'; S.bath='방안(인실)'; S.station=null;
  document.getElementById('station-selected').classList.remove('show');
  document.getElementById('station-results').style.display='none';
  const ub=document.getElementById('upload-box');
  ub.classList.remove('has-img');
  ub.innerHTML='<span style="font-size:24px;display:block;margin-bottom:4px">🖼️</span>탭해서 사진 선택';
  document.querySelectorAll('#bed-chips  .chip-opt').forEach((el,i)=>el.classList.toggle('on',i===0));
  document.querySelectorAll('#bath-chips .chip-opt').forEach((el,i)=>el.classList.toggle('on',i===0));
  setAiStatus('','');
  document.getElementById('ai-btn').disabled=false;
}
function pickChip(type,el,val) {
  el.parentElement.querySelectorAll('.chip-opt').forEach(e=>e.classList.remove('on'));
  el.classList.add('on');
  if(type==='bed') S.bed=val; else S.bath=val;
}
function handleImg(e) {
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=d=>{S.img=d.target.result;setPreview(S.img);};
  r.readAsDataURL(f);
}
function previewUrl(url){ if(url){S.img=url;setPreview(url);} }
function setPreview(src) {
  const ub=document.getElementById('upload-box');
  ub.classList.add('has-img');
  ub.innerHTML=`<img src="${esc(src)}" alt="미리보기" onerror="this.parentElement.classList.remove('has-img');this.parentElement.innerHTML='이미지를 불러올 수 없어요'">`;
}
async function addItem() {
  const name=document.getElementById('f-name').value.trim();
  if (!name) { showToast('숙소 이름을 입력해주세요'); return; }
  if (!S.me) { showToast('내 이름을 먼저 선택해주세요'); return; }
  const imgUrl=document.getElementById('f-img-url').value.trim();
  // 역: 선택된 staton 객체 or 텍스트 입력
  const staTxt=document.getElementById('f-station-search').value.trim();
  const item = {
    id:Date.now(), ts:Date.now(), name,
    bed:S.bed, bath:S.bath,
    station: S.station ? getStaLabel(S.station.name) : (staTxt||null),
    stationColor: S.station ? S.station.color : null,
    stationLine:  S.station ? S.station.lineName : null,
    price:   parseInt(document.getElementById('f-price').value)||null,
    url:     document.getElementById('f-url').value.trim(),
    img:     S.img||imgUrl,
    memo:    document.getElementById('f-memo').value.trim(),
    by:S.me, hearts:[],
  };
  S.items.unshift(item);
  closeModal(); renderTable(); showToast('추가했어요 ✓');
  await dbInsert(item);
}

/* ── UTIL ── */
function esc(s) {
  return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}

// 모달 바깥 클릭시 역 검색창 닫기
document.addEventListener('click', e => {
  if (!e.target.closest('.station-wrap')) {
    document.getElementById('station-results').style.display='none';
  }
});

/* ── INIT ── */
renderPills(); renderTable(); initSupabase();
</script>
